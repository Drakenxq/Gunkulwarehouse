<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GUNKUL Warehouse — เข้าสู่ระบบ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Kanit:wght@400;500;600;700&family=Noto+Sans+Thai:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy-top:#1f2e52;
    --navy-bottom:#101a30;
    --navy-deep:#0a1122;
    --gold:#d0a154;
    --gold-light:#f3d99a;
    --leaf:#5fae72;
    --text-dim:#9aa7c2;
    --text-bright:#ffffff;
    --glass-bg:rgba(255,255,255,0.07);
    --glass-border:rgba(255,255,255,0.16);
    --card-bg:#101a30;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:"Noto Sans Thai","Kanit",-apple-system,sans-serif;
    background:var(--navy-deep);
    color:var(--text-bright);
    overflow-x:hidden;
  }
  a{color:inherit;}
  button{font-family:inherit;}

  @keyframes floatUp{
    0%{ transform:translateY(0) scale(.9); opacity:0; }
    12%{ opacity:.85; }
    100%{ transform:translateY(-220px) scale(1.05); opacity:0; }
  }
  @keyframes ringSpin{
    from{ transform:rotate(0deg); }
    to{ transform:rotate(360deg); }
  }
  @keyframes bladeSpin{
    from{ transform:rotate(0deg); }
    to{ transform:rotate(360deg); }
  }
  @keyframes corePulse{
    0%,100%{ opacity:.55; transform:scale(1); }
    50%{ opacity:.85; transform:scale(1.06); }
  }
  @keyframes fadeUp{
    from{ opacity:0; transform:translateY(14px); }
    to{ opacity:1; transform:translateY(0); }
  }
  @keyframes spin{
    to{ transform:rotate(360deg); }
  }
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.01ms !important; animation-iteration-count:1 !important;}
  }

  /* ============ LAYOUT ============ */
  .page{
    display:flex;
    min-height:100vh;
  }

  /* ============ HERO ============ */
  .hero{
    position:relative;
    flex:1 1 58%;
    min-height:100vh;
    overflow:hidden;
    background:
      radial-gradient(ellipse 900px 600px at 78% 8%, rgba(208,161,84,.16), transparent 60%),
      radial-gradient(ellipse 700px 500px at 8% 92%, rgba(95,174,114,.14), transparent 60%),
      linear-gradient(160deg,var(--navy-top) 0%,var(--navy-deep) 75%);
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    padding:36px 40px;
  }

  .brand-mark{
    display:flex;
    align-items:center;
    gap:10px;
    position:relative;
    z-index:4;
  }
  .brand-mark img{ height:20px; width:auto; filter:brightness(0) invert(1); }
  .brand-mark span{
    font-size:11.5px;
    letter-spacing:1.5px;
    color:var(--text-dim);
    font-weight:600;
    text-transform:uppercase;
  }

  /* ---- skyline silhouette ---- */
  .skyline{
    position:absolute;
    left:0; right:0; bottom:0;
    height:42%;
    z-index:1;
    opacity:.55;
    -webkit-mask-image:linear-gradient(to top, black 55%, transparent 100%);
            mask-image:linear-gradient(to top, black 55%, transparent 100%);
  }
  .skyline svg{ width:100%; height:100%; display:block; }

  /* ---- energy orb (signature element) ---- */
  .energy-orb{
    position:absolute;
    top:12%;
    right:8%;
    width:min(46vw, 420px);
    height:min(46vw, 420px);
    z-index:2;
  }
  .orb-ring{
    position:absolute; inset:0;
    border-radius:50%;
    border:1px dashed rgba(255,255,255,.22);
    animation:ringSpin 50s linear infinite;
  }
  .orb-ring::before{
    content:"";
    position:absolute; inset:14px;
    border-radius:50%;
    border:1px solid rgba(208,161,84,.28);
  }
  .orb-core{
    position:absolute;
    left:50%; top:50%;
    width:70%; height:70%;
    transform:translate(-50%,-50%);
    border-radius:50%;
    background:radial-gradient(circle at 42% 38%, rgba(243,217,154,.9), rgba(208,161,84,.35) 45%, rgba(31,46,82,0) 72%);
    filter:blur(1px);
    animation:corePulse 5.5s ease-in-out infinite;
  }
  .turbine-svg{
    position:absolute;
    left:38%; top:8%;
    width:46%; height:80%;
  }
  .blades{
    transform-origin:100px 92px;
    animation:bladeSpin 9s linear infinite;
  }
  .leaf-cluster{
    position:absolute;
    left:14%; bottom:10%;
    width:36%; height:36%;
    opacity:.9;
  }
  .bubbles{ position:absolute; inset:-20% -10%; }
  .bubble{
    position:absolute;
    bottom:0;
    border-radius:50%;
    background:radial-gradient(circle at 32% 28%, rgba(255,255,255,.85), rgba(255,255,255,.05) 70%);
    animation:floatUp linear infinite;
  }
  .bubble:nth-child(1){ left:10%;  width:10px; height:10px; animation-duration:7s;  animation-delay:.2s; }
  .bubble:nth-child(2){ left:28%;  width:16px; height:16px; animation-duration:9.5s; animation-delay:1.4s; }
  .bubble:nth-child(3){ left:52%;  width:8px;  height:8px;  animation-duration:6.2s; animation-delay:.6s; }
  .bubble:nth-child(4){ left:68%;  width:13px; height:13px; animation-duration:8.4s; animation-delay:2.1s; }
  .bubble:nth-child(5){ left:82%;  width:9px;  height:9px;  animation-duration:7.6s; animation-delay:.9s; }
  .bubble:nth-child(6){ left:40%;  width:20px; height:20px; animation-duration:10.5s;animation-delay:3s;  }

  /* ---- tagline ---- */
  .tagline{ position:relative; z-index:4; max-width:560px; }
  .tagline .script{
    font-family:"Caveat", cursive;
    font-weight:700;
    font-size:clamp(34px, 4.6vw, 58px);
    line-height:1.05;
    color:#fff;
    margin:0 0 10px;
    text-shadow:0 2px 18px rgba(0,0,0,.25);
  }
  .tagline .sub{
    font-size:13.5px;
    line-height:1.7;
    color:var(--text-dim);
    margin:0;
    max-width:460px;
  }

  /* ============ LOGIN PANEL ============ */
  .panel{
    flex:0 0 420px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--navy-bottom);
    padding:32px;
  }
  .login-card{
    width:100%;
    max-width:340px;
    background:var(--glass-bg);
    border:1px solid var(--glass-border);
    border-radius:16px;
    padding:34px 28px 28px;
    backdrop-filter:blur(6px);
    animation:fadeUp .55s cubic-bezier(.22,1,.36,1) both;
  }
  .login-card h1{
    font-family:"Kanit",sans-serif;
    font-size:22px;
    font-weight:600;
    margin:0 0 4px;
    color:#fff;
  }
  .panel-sub{
    font-size:12.5px;
    color:var(--text-dim);
    margin:0 0 26px;
    letter-spacing:.3px;
  }

  label{
    display:block;
    font-size:11px;
    color:var(--text-dim);
    margin-bottom:20px;
    font-weight:600;
    letter-spacing:.6px;
    text-transform:uppercase;
  }
  label:not(.checkbox){ margin-bottom:20px; }
  label:not(.checkbox):focus-within{ color:var(--gold-light); }

  input[type="email"], input[type="text"], input[type="password"]{
    width:100%;
    margin-top:9px;
    padding:12px 14px;
    border-radius:9px;
    border:1px solid rgba(255,255,255,.14);
    background:rgba(255,255,255,.04);
    color:#fff;
    font-size:14px;
    font-weight:400;
    letter-spacing:normal;
    text-transform:none;
    font-family:inherit;
    outline:none;
    transition:border-color .2s ease, background .2s ease, box-shadow .2s ease;
  }
  input[type="email"]::placeholder, input[type="text"]::placeholder, input[type="password"]::placeholder{ color:#5c6a8c; }
  input[type="email"]:focus, input[type="text"]:focus, input[type="password"]:focus{
    border-color:var(--gold);
    background:rgba(255,255,255,.06);
    box-shadow:0 0 0 3px rgba(208,161,84,.12);
  }
  input:focus-visible, button:focus-visible, a:focus-visible{
    outline:2px solid var(--gold);
    outline-offset:2px;
  }

  /* ---- input with leading icon (email) ---- */
  .input-wrap{ position:relative; }
  .input-wrap input{ padding-left:40px; }
  .input-icon{
    position:absolute;
    left:13px; top:50%;
    transform:translateY(-50%);
    width:16px; height:16px;
    color:#5c6a8c;
    pointer-events:none;
    transition:color .2s ease;
  }
  .input-icon svg{ width:100%; height:100%; stroke:currentColor; }
  label:not(.checkbox):focus-within .input-icon{ color:var(--gold); }

  .pw-wrap{ position:relative; }
  .pw-wrap input{ padding-right:42px; padding-left:40px; }
  .pw-toggle{
    position:absolute;
    right:6px; top:50%;
    transform:translateY(-50%);
    width:30px; height:30px;
    display:flex; align-items:center; justify-content:center;
    background:transparent;
    border:none;
    color:var(--text-dim);
    cursor:pointer;
    border-radius:6px;
  }
  .pw-toggle:hover{ color:#fff; background:rgba(255,255,255,.06); }
  .pw-toggle svg{ width:17px; height:17px; stroke:currentColor; }
  .pw-toggle .eye-off{ display:none; }
  .pw-toggle.showing .eye{ display:none; }
  .pw-toggle.showing .eye-off{ display:block; }

  .row-between{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin:2px 0 22px;
  }
  .checkbox{
    display:flex;
    align-items:center;
    gap:7px;
    font-size:12.5px;
    color:var(--text-dim);
    cursor:pointer;
    margin:0;
  }
  .checkbox input{ accent-color:var(--leaf); width:14px; height:14px; }
  .link-muted{
    font-size:12.5px;
    color:var(--text-dim);
    text-decoration:none;
    border-bottom:1px solid transparent;
    transition:color .2s ease, border-color .2s ease;
  }
  .link-muted:hover{ color:var(--gold-light); border-color:var(--gold-light); }

  .btn-signin{
    width:100%;
    padding:12px;
    border:none;
    border-radius:9px;
    background:linear-gradient(135deg,var(--gold-light),var(--gold));
    color:#20304f;
    font-weight:700;
    font-size:14.5px;
    letter-spacing:.2px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    transition:transform .18s cubic-bezier(.34,1.56,.64,1), box-shadow .2s ease, opacity .2s ease;
    box-shadow:0 8px 22px -8px rgba(208,161,84,.55);
  }
  .btn-signin:hover{ transform:translateY(-1px); box-shadow:0 12px 26px -8px rgba(208,161,84,.65); }
  .btn-signin:active{ transform:translateY(0) scale(.98); }
  .btn-signin:disabled{ opacity:.75; cursor:default; }
  .btn-spinner{
    display:none;
    width:15px; height:15px;
    border-radius:50%;
    border:2px solid rgba(32,48,79,.35);
    border-top-color:#20304f;
    animation:spin .7s linear infinite;
  }
  .btn-signin.loading .btn-label{ opacity:.8; }
  .btn-signin.loading .btn-spinner{ display:inline-block; }

  .error-msg{
    margin:14px 0 0;
    font-size:12.5px;
    color:#ff9a9a;
    background:rgba(220,80,80,.1);
    border:1px solid rgba(220,80,80,.25);
    padding:9px 11px;
    border-radius:8px;
  }

  .footer-note{
    margin:24px 0 0;
    text-align:center;
    font-size:11px;
    color:#5c6a8c;
  }

  /* ============ RESPONSIVE ============ */
  @media (max-width:960px){
    .page{ flex-direction:column; }
    .hero{ min-height:280px; padding:26px 24px; }
    .energy-orb{ width:220px; height:220px; top:8%; right:6%; }
    .tagline .script{ font-size:30px; }
    .tagline .sub{ display:none; }
    .panel{ flex:1; background:var(--navy-bottom); }
  }
  @media (max-width:480px){
    .hero{ min-height:220px; }
    .energy-orb{ width:160px; height:160px; }
    .tagline .script{ font-size:24px; }
    .login-card{ padding:28px 20px 22px; }
  }
</style>
</head>
<body>

<div class="page">

  <section class="hero">
    <div class="brand-mark">
      <img alt="Gunkul" src="./src/svg/logo-default.svg">
    </div>

    <div class="energy-orb" aria-hidden="true">
      <div class="orb-ring"></div>
      <div class="orb-core"></div>
      <svg class="turbine-svg" viewBox="0 0 200 260">
        <line x1="100" y1="255" x2="100" y2="92" stroke="rgba(255,255,255,.5)" stroke-width="4" stroke-linecap="round"/>
        <g class="blades">
          <path d="M100,92 C95,70 95,32 100,18 C105,32 105,70 100,92 Z" fill="rgba(255,255,255,.8)"/>
          <path d="M100,92 C95,70 95,32 100,18 C105,32 105,70 100,92 Z" fill="rgba(255,255,255,.8)" transform="rotate(120 100 92)"/>
          <path d="M100,92 C95,70 95,32 100,18 C105,32 105,70 100,92 Z" fill="rgba(255,255,255,.8)" transform="rotate(240 100 92)"/>
        </g>
        <circle cx="100" cy="92" r="6" fill="rgba(255,255,255,.9)"/>
      </svg>
      <div class="bubbles">
        <span class="bubble"></span>
        <span class="bubble"></span>
        <span class="bubble"></span>
        <span class="bubble"></span>
        <span class="bubble"></span>
        <span class="bubble"></span>
      </div>
    </div>

    <div class="skyline" aria-hidden="true">
      <svg viewBox="0 0 1200 200" preserveAspectRatio="none">
        <rect x="0" y="90" width="60" height="110" fill="rgba(255,255,255,.5)"/>
        <rect x="65" y="60" width="45" height="140" fill="rgba(255,255,255,.4)"/>
        <rect x="118" y="110" width="70" height="90" fill="rgba(255,255,255,.55)"/>
        <rect x="196" y="40" width="38" height="160" fill="rgba(255,255,255,.35)"/>
        <rect x="242" y="85" width="55" height="115" fill="rgba(255,255,255,.5)"/>
        <rect x="305" y="70" width="42" height="130" fill="rgba(255,255,255,.45)"/>
        <rect x="900" y="65" width="46" height="135" fill="rgba(255,255,255,.4)"/>
        <rect x="954" y="100" width="60" height="100" fill="rgba(255,255,255,.5)"/>
        <rect x="1022" y="50" width="38" height="150" fill="rgba(255,255,255,.35)"/>
        <rect x="1068" y="95" width="55" height="105" fill="rgba(255,255,255,.48)"/>
        <rect x="1130" y="75" width="45" height="125" fill="rgba(255,255,255,.4)"/>
      </svg>
    </div>

    <div class="tagline">
      <p class="script">not only the energy, we care</p>
      <p class="sub">เราไม่ได้ใส่ใจเพียงแค่เรื่องพลังงาน แต่เราใส่ใจการดำรงอยู่ของโลกและคุณภาพชีวิตที่ดี</p>
    </div>
  </section>

  <section class="panel">
    <form class="login-card" id="loginForm" novalidate>
      <h1>เข้าสู่ระบบ</h1>
      <p class="panel-sub">Warehouse Noppawong</p>

      <label for="username">อีเมล
        <div class="input-wrap">
          <span class="input-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16v16H4z" opacity="0"/><path d="M3 6.5A2.5 2.5 0 0 1 5.5 4h13A2.5 2.5 0 0 1 21 6.5v11A2.5 2.5 0 0 1 18.5 20h-13A2.5 2.5 0 0 1 3 17.5v-11Z"/><path d="m4 6 8 6.5L20 6"/></svg>
          </span>
          <input type="email" id="username" name="username" placeholder="you@gunkul.com" autocomplete="email" required>
        </div>
      </label>

      <label for="password">รหัสผ่าน
        <div class="pw-wrap">
          <span class="input-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="10.5" width="14" height="9.5" rx="2"/><path d="M8 10.5V7.5a4 4 0 0 1 8 0v3"/></svg>
          </span>
          <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
          <button type="button" class="pw-toggle" id="pwToggle" aria-label="แสดง/ซ่อนรหัสผ่าน">
            <svg class="eye" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7Z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg class="eye-off" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3l18 18"/><path d="M10.6 5.2A11 11 0 0 1 12 5c7 0 11 7 11 7a13.7 13.7 0 0 1-3.4 4"/><path d="M6.6 6.6C3.8 8.3 2 12 2 12s4 7 11 7a10.4 10.4 0 0 0 3.4-.6"/><path d="M9.9 9.9a3 3 0 0 0 4.2 4.2"/></svg>
          </button>
        </div>
      </label>

      <div class="row-between">
        <label class="checkbox">
          <input type="checkbox" id="remember"> จดจำฉันไว้
        </label>
        <a href="#" class="link-muted">ลืมรหัสผ่าน?</a>
      </div>

      <button type="submit" class="btn-signin" id="signinBtn">
        <span class="btn-label">เข้าสู่ระบบ</span>
        <span class="btn-spinner" aria-hidden="true"></span>
      </button>

      <p class="error-msg" id="errorMsg" role="alert" hidden></p>

      <p class="footer-note">© 2026 GUNKUL Engineering Warehouse System</p>
    </form>
  </section>

</div>

<script type="module" src="./src/js/login.js"></script>

<script type="module">
  import { auth } from "./src/js/firebase.js";
  import { onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  onAuthStateChanged(auth, (user) => {
    if (user) {
      window.location.href = "main.html";
    }
  });
</script>

</body>
</html>
