<!DOCTYPE html>
<html lang="th" class="auth-pending">
<head>
<meta charset="UTF-8">
<title>GUNKUL Warehouse — Noppawong</title>
<style>
  :root{
    --bg-sidebar-top:#2b3c63;
    --bg-sidebar-bottom:#131316;
    --bg-hover:rgba(255,255,255,0.055);
    --bg-active:rgba(255,255,255,0.055);
    --gold:#d0a154;
    --navy:#28396200;
    --navy-solid:#28305c;
    --text-primary:#f4f4f6;
    --text-secondary:#97979f;
    --text-tertiary:#67676f;
    --divider:rgba(255,255,255,0.07);
    --sidebar-w:250px;
    --sidebar-w-collapsed:76px;
  }

  *{box-sizing:border-box;}

  html.auth-pending{ visibility:hidden; }

  body{
    margin:0;
    font-family:"Segoe UI", "Noto Sans Thai", -apple-system, sans-serif;
    background:#e9edf3;
  }

  @keyframes sidebarSlideIn{
    from{ opacity:0; transform:translateX(-24px); }
    to{ opacity:1; transform:translateX(0); }
  }
  @keyframes fadeSlideDown{
    from{ opacity:0; transform:translateY(-8px); }
    to{ opacity:1; transform:translateY(0); }
  }
  @keyframes itemRiseIn{
    from{ opacity:0; transform:translateX(-14px); }
    to{ opacity:1; transform:translateX(0); }
  }
  @keyframes logoGlow{
    0%,100%{ filter:drop-shadow(0 0 0 rgba(208,161,84,0)); }
    50%{ filter:drop-shadow(0 0 6px rgba(208,161,84,.5)); }
  }
  @keyframes contentFadeIn{
    from{ opacity:0; transform:translateY(6px); }
    to{ opacity:1; transform:translateY(0); }
  }
  @keyframes barSweep{
    0%{ transform:translateX(-40%); }
    100%{ transform:translateX(140%); }
  }
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.01ms !important; animation-iteration-count:1 !important; transition-duration:.01ms !important;}
  }

  /* ============ SIDEBAR ============ */
  .sidebar{
    position:relative;
    width:var(--sidebar-w);
    height:100vh;
    background:linear-gradient(180deg,var(--bg-sidebar-top) 0%,var(--bg-sidebar-bottom) 100%);
    border-right:1px solid var(--divider);
    display:flex;
    flex-direction:column;
    transition:width .32s cubic-bezier(.4,0,.2,1);
    overflow:hidden;
    flex-shrink:0;
    animation:sidebarSlideIn .5s cubic-bezier(.22,1,.36,1) both;
  }
  .sidebar.collapsed{width:var(--sidebar-w-collapsed);}

  /* ---- header ---- */
  .sidebar-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    padding:18px 16px 16px;
    white-space:nowrap;
    opacity:0;
    animation:fadeSlideDown .55s ease .1s forwards;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 12px; 
    min-width: 0;    
    overflow: hidden;
  }
  
  .logo-mark {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 26px;
    width: auto; 
    flex-shrink: 0;
    transition: transform 0.2s ease;
  }
  
  .logo-mark img {
    height: 100%;
    width: auto;
    object-fit: contain;
    filter: brightness(0) invert(1);
  }
  
  .sidebar-header:hover .logo-mark{ transform:scale(1.04) rotate(-2deg); }
  
  .brand {
    display:flex;
    flex-direction:column;
    line-height:1.15;
    overflow:hidden;
    min-width:0;
  }
  .brand-bold{
    font-size:15px;
    font-weight:700;
    color:var(--text-primary);
    letter-spacing:.2px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .brand-light{
    font-size:11px;
    font-weight:400;
    color:var(--text-secondary);
    letter-spacing:.2px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .header-toggle{
    width:26px;height:26px;flex-shrink:0;
    border-radius:7px;
    display:flex;align-items:center;justify-content:center;
    background:transparent;
    border:none;
    cursor:pointer;
    color:var(--text-tertiary);
    transition:background .2s ease,color .2s ease;
  }
  .header-toggle:hover{ background:var(--bg-hover); color:var(--text-primary); }
  .header-toggle:active{ transform:scale(.92); }
  .header-toggle svg{
    width:15px;height:15px;
    stroke:currentColor;
    transition:transform .35s cubic-bezier(.4,0,.2,1);
  }
  .sidebar.collapsed .header-toggle svg{ transform:rotate(180deg); }

  /* ---- nav ---- */
  .sidebar-nav{
    margin-top:2px;
    padding:0 10px;
    display:flex;
    flex-direction:column;
    flex:1;
    overflow-y:auto;
  }
  .nav-group{ margin-top:16px; }
  .nav-group:first-child{ margin-top:2px; }
  .sidebar.collapsed .nav-group{ margin-top:8px; }

  .nav-group-label{
    padding:4px 10px 8px;
    font-size:11.5px;
    font-weight:600;
    color: #ffffff;
    letter-spacing:.2px;
    white-space:nowrap;
    overflow:hidden;
  }
  .sidebar.collapsed .nav-group-label{ display:none; }

  .nav-item{
    display:flex;
    align-items:center;
    gap:10px;
    padding:9px 10px;
    border-radius:8px;
    text-decoration:none;
    color:var(--text-secondary);
    font-size:13.5px;
    font-weight:500;
    white-space:nowrap;
    position:relative;
    opacity:0;
    animation:itemRiseIn .45s ease forwards;
    transition:background .2s ease,color .2s ease,transform .2s ease;
  }
  .nav-item svg{
    width:18px;height:18px;flex-shrink:0;
    stroke:currentColor;
    transition:stroke .2s ease,transform .3s cubic-bezier(.34,1.56,.64,1);
  }
  .nav-item:hover{
    background:var(--bg-hover);
    color:var(--text-primary);
    transform:translateX(2px);
  }
  .nav-item:hover svg{ transform:scale(1.08); }
  .nav-item:active{ transform:translateX(2px) scale(.97); }
  .nav-item.active{
    background:var(--bg-active);
    color:var(--text-primary);
    font-weight:600;
  }
  .nav-item.active svg{ stroke:var(--gold); }
  .nav-item.active::before{
    content:"";
    position:absolute;
    left:2px; top:8px; bottom:8px;
    width:3px;
    border-radius:2px;
    background:var(--gold);
  }

  .nav-label{overflow:hidden;text-overflow:ellipsis;}

  /* ---- footer ---- */
  .sidebar-footer{
    padding:12px 10px 16px;
    border-top:1px solid var(--divider);
    display:flex;
    flex-direction:column;
    gap:4px;
  }
  .user-info{
    padding:4px 10px 8px;
    white-space:nowrap;
    overflow:hidden;
  }
  .user-name{
    font-size:12.5px;
    font-weight:500;
    color:var(--text-secondary);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .sidebar.collapsed .user-info{ display:none; }
  .signout-item{
    display:flex;
    align-items:center;
    gap:10px;
    padding:9px 10px;
    border-radius:8px;
    text-decoration:none;
    color:var(--text-secondary);
    font-size:13.5px;
    font-weight:500;
    white-space:nowrap;
    transition:background .2s ease,color .2s ease,transform .2s ease;
  }
  .signout-item:hover{
    background:rgba(220,80,80,0.12);
    color:#ff8a8a;
    transform:translateX(2px);
  }
  .signout-item:hover svg{ stroke:#ff8a8a; transform:translateX(2px); }
  .signout-item svg{width:17px;height:17px;flex-shrink:0;stroke:currentColor;transition:stroke .2s ease,transform .2s ease;}

  /* hide text labels when collapsed */
  .sidebar.collapsed .brand,
  .sidebar.collapsed .nav-label,
  .sidebar.collapsed .signout-item span{
    display:none;
  }
  .sidebar.collapsed .nav-item,
  .sidebar.collapsed .signout-item{
    justify-content:center;
    gap:0;
  }
  
  .sidebar.collapsed .sidebar-header {
    flex-direction: column;
    padding: 20px 8px 14px;
    gap: 16px; 
  }
  .sidebar.collapsed .header-left{
    flex-direction:column;
    width: 100%;
    align-items: center;
    justify-content: center;
  }
  .sidebar.collapsed .logo-mark {
    width: 100%;
    height: 22px;
  }

  .app{
    display:flex;
    height:100vh;
  }

  .content-wrap{
    position:relative;
    flex:1;
    height:100%;
    overflow:hidden;
  }

  .load-bar{
    position:absolute;
    top:0; left:0;
    height:3px;
    width:100%;
    background:rgba(208,161,84,0);
    z-index:5;
    pointer-events:none;
    overflow:hidden;
    opacity:0;
    transition:opacity .2s ease;
  }
  .load-bar.active{
    opacity:1;
    background:rgba(208,161,84,.18);
  }
  .load-bar span{
    display:block;
    position:absolute;
    top:0; left:0;
    height:100%;
    width:40%;
    background:linear-gradient(90deg,transparent,var(--gold),transparent);
    animation:barSweep 1s ease-in-out infinite;
  }

  #content{
      flex:1;
      width:100%;
      height:100%;
      border:none;
      background:#f5f7fb;
      opacity:0;
      transition:opacity .35s ease;
  }
  #content.loaded{
      opacity:1;
      animation:contentFadeIn .4s ease;
  }
  
  .sidebar-nav::-webkit-scrollbar{width:4px;}
  .sidebar-nav::-webkit-scrollbar-thumb{background:rgba(148, 136, 136, 0.15);border-radius:2px;}
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="header-left">
        <div class="logo-mark">
          <img alt="Gunkul" src="./src/svg/logo-default.svg">
        </div>
        <div class="brand">
          <span class="brand-light">Warehouse — Noppawong</span>
        </div>
      </div>
      <button class="header-toggle" id="collapseBtn" aria-label="Toggle sidebar">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 9l5-5 5 5"/><path d="M7 15l5 5 5-5"/></svg>
      </button>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-group">
        <div class="nav-group-label">เมนูหลัก</div>
        <a class="nav-item" style="animation-delay:.06s" href="./src/home.html" target="contentFrame" data-page="home">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>
          <span class="nav-label">Home</span>
        </a>
        <a class="nav-item" style="animation-delay:.11s" href="./src/dashboard.html" target="contentFrame" data-page="dashboard">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          <span class="nav-label">Dashboard</span>
        </a>
        <a class="nav-item" style="animation-delay:.16s" href="./src/item-master.html" target="contentFrame" data-page="item-master">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8 12 3 3 8l9 5 9-5Z"/><path d="M3 8v8l9 5 9-5V8"/><path d="M12 13v8"/></svg>
          <span class="nav-label">Item Master</span>
        </a>
        <a class="nav-item" style="animation-delay:.21s" href="./src/report.html" target="contentFrame" data-page="vendor-directory">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 21V8l8-5 8 5v13"/><path d="M9 21v-6h6v6"/><path d="M9 12h.01M15 12h.01M9 8h.01M15 8h.01"/></svg>
          <span class="nav-label">Report</span>
        </a>
        <a class="nav-item" style="animation-delay:.26s" href="vendor.html" target="contentFrame" data-page="tracking-sheet">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3h6a1 1 0 0 1 1 1v1H8V4a1 1 0 0 1 1-1Z"/><path d="M6 6h12v14a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1V6Z"/><path d="M9 11h6M9 15h6"/></svg>
          <span class="nav-label">Vendor</span>
        </a>
      </div>

      <div class="nav-group">
        <div class="nav-group-label">ข้อมูลอ้างอิง</div>
        <a class="nav-item" style="animation-delay:.31s" href="knowledge-base.html" target="contentFrame" data-page="knowledge-base">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5.5A2.5 2.5 0 0 1 6.5 3H12v18H6.5A2.5 2.5 0 0 1 4 18.5v-13Z"/><path d="M20 5.5A2.5 2.5 0 0 0 17.5 3H12v18h5.5a2.5 2.5 0 0 0 2.5-2.5v-13Z"/></svg>
          <span class="nav-label">Knowledge Base</span>
        </a>
        <a class="nav-item" style="animation-delay:.36s" href="org-chart.html" target="contentFrame" data-page="org-chart">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="2.5"/><circle cx="5" cy="19" r="2.5"/><circle cx="19" cy="19" r="2.5"/><path d="M12 7.5V12M12 12 6.5 17M12 12 17.5 17"/></svg>
          <span class="nav-label">Organization Chart</span>
        </a>
      </div>
    </nav>

    <div class="sidebar-footer">
      <div class="user-info" id="userInfo">
        <span class="user-name" id="userName">กำลังโหลด...</span>
      </div>
      <a class="signout-item" href="#" data-page="signout">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
        <span>Sign out</span>

    </div>
  </aside>

   <div class="content-wrap">
     <div class="load-bar" id="loadBar"><span></span></div>
     <iframe id="content" name="contentFrame" src="./src/home.html"></iframe>
   </div>
</div>

<!-- ===== Auth Guard ===== -->
<script type="module">
  import { auth } from "./src/js/firebase.js";
  import { onAuthStateChanged, signOut }
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getFirestore, doc, getDoc }
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const db = getFirestore(auth.app);

  const userNameEl = document.getElementById('userName');
  const signoutBtn = document.querySelector('.signout-item');

  function revealApp(){
    document.documentElement.classList.remove('auth-pending');
  }

  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      window.location.replace('login.html');
      return;
    }

    let displayName = user.displayName || (user.email ? user.email.split('@')[0] : 'ผู้ใช้งาน');
    try {
      const snap = await getDoc(doc(db, 'users', user.uid));
      if (snap.exists() && snap.data().name) {
        displayName = snap.data().name;
      }
    } catch (err) {
      console.error('โหลดชื่อผู้ใช้จาก Firestore ไม่สำเร็จ:', err);
    }

    userNameEl.textContent = displayName;
    revealApp();
  });

  if (signoutBtn) {
    signoutBtn.addEventListener('click', async (e) => {
      e.preventDefault();
      if (confirm('คุณต้องการออกจากระบบใช่หรือไม่?')) {
        try {
          await signOut(auth);
        } catch (err) {
          console.error('Sign out error:', err);
        } finally {
          localStorage.removeItem('gunkul_active_page');
          window.location.href = 'login.html';
        }
      }
    });
  }
</script>

<script>
  const sidebar = document.getElementById('sidebar');
  const collapseBtn = document.getElementById('collapseBtn');
  const SIDEBAR_KEY = 'sidebarCollapsed';

  if(localStorage.getItem(SIDEBAR_KEY) === 'true'){
      sidebar.classList.add('collapsed');
  }

  collapseBtn.addEventListener('click',()=>{
      sidebar.classList.toggle('collapsed');
      localStorage.setItem(
          SIDEBAR_KEY,
          sidebar.classList.contains('collapsed')
      );
  });

  const STORAGE_KEY = 'gunkul_active_page';
  const DEFAULT_PAGE = 'home';
  const PAGE_PATH = './src/';

  const content = document.getElementById('content');
  const loadBar = document.getElementById('loadBar');

  function showLoading(){
    loadBar.classList.add('active');
    content.classList.remove('loaded');
  }
  function hideLoading(){
    loadBar.classList.remove('active');
    void content.offsetWidth;
    content.classList.add('loaded');
  }
  content.addEventListener('load', hideLoading);

  function setActivePage(page) {
    document.querySelectorAll('.nav-item').forEach(item => {
      item.classList.toggle('active', item.dataset.page === page);
    });
    localStorage.setItem(STORAGE_KEY, page);
  }

  function navigateTo(item){
    setActivePage(item.dataset.page);
    showLoading();
    content.src = item.getAttribute('href');
  }

  const savedPage = localStorage.getItem(STORAGE_KEY) || DEFAULT_PAGE;
  setActivePage(savedPage);

  const target = document.querySelector(`.nav-item[data-page="${savedPage}"]`);
  if(target){
      showLoading();
      content.src = target.getAttribute('href');
  }

  document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click',(e)=>{
          e.preventDefault();
          if(item.dataset.page === 'signout') return;
          if(item.classList.contains('active')) return; 
          navigateTo(item);
      });
  });
</script>

</body>
</html>
