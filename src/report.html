<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Warehouse Deliveries — Manifest Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#12161c;
    --panel:#1a2029;
    --panel-2:#212a35;
    --border:#2b3542;
    --text:#e9edf2;
    --text-dim:#8b96a5;
    --accent:#ff7a1a;
    --accent-soft:#ff7a1a22;
    --ok:#3dd68c;
    --ok-soft:#3dd68c22;
    --warn:#ffc145;
    --warn-soft:#ffc14522;
    --bad:#ff5470;
    --bad-soft:#ff547022;
    --mono:'IBM Plex Mono', monospace;
    --disp:'Oswald', sans-serif;
    --body:'Inter', sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(1200px 600px at 100% -10%, #ff7a1a0d, transparent),
      var(--bg);
    color:var(--text);
    font-family:var(--body);
    min-height:100vh;
    padding:28px 20px 60px;
  }
  .wrap{max-width:1280px;margin:0 auto;}

  /* ---- Manifest header (signature element) ---- */
  .manifest{
    position:relative;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:6px;
    padding:22px 26px;
    margin-bottom:22px;
    overflow:hidden;
  }
  .manifest::before{
    content:"";
    position:absolute;
    left:0;right:0;bottom:0;
    height:0;
    border-bottom:2px dashed #3a4451;
  }
  .manifest-top{
    display:flex;justify-content:space-between;align-items:flex-start;
    flex-wrap:wrap;gap:16px;
    padding-bottom:18px;
    border-bottom:1px dashed #3a4451;
  }
  .manifest-title-block .eyebrow{
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:.18em;
    color:var(--accent);
    text-transform:uppercase;
    margin:0 0 6px;
  }
  .manifest-title-block h1{
    font-family:var(--disp);
    font-weight:700;
    font-size:32px;
    letter-spacing:.01em;
    margin:0;
    text-transform:uppercase;
  }
  .manifest-title-block p{
    margin:6px 0 0;
    color:var(--text-dim);
    font-size:13.5px;
  }
  .status-block{
    text-align:right;
    font-family:var(--mono);
    font-size:12px;
    color:var(--text-dim);
    min-width:200px;
  }
  .status-pill{
    display:inline-flex;align-items:center;gap:7px;
    padding:5px 12px;
    border-radius:20px;
    background:var(--panel-2);
    border:1px solid var(--border);
    font-size:11.5px;
    letter-spacing:.06em;
    margin-bottom:8px;
  }
  .dot{width:7px;height:7px;border-radius:50%;background:var(--text-dim);}
  .dot.live{background:var(--ok);box-shadow:0 0 0 0 var(--ok-soft);animation:pulse 1.8s infinite;}
  .dot.err{background:var(--bad);}
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 #3dd68c55;}
    70%{box-shadow:0 0 0 8px #3dd68c00;}
    100%{box-shadow:0 0 0 0 #3dd68c00;}
  }
  .manifest-bottom{
    display:flex;justify-content:space-between;align-items:center;
    padding-top:14px;flex-wrap:wrap;gap:12px;
  }
  .barcode{display:flex;align-items:flex-end;gap:2px;height:26px;opacity:.85;}
  .barcode span{display:block;width:2px;background:var(--text-dim);}
  .manifest-actions{display:flex;gap:10px;}
  button.btn{
    font-family:var(--body);
    font-weight:600;
    font-size:13px;
    color:var(--text);
    background:var(--panel-2);
    border:1px solid var(--border);
    padding:9px 16px;
    border-radius:5px;
    cursor:pointer;
    transition:.15s;
  }
  button.btn:hover{border-color:var(--accent);color:var(--accent);}
  button.btn.primary{background:var(--accent);border-color:var(--accent);color:#1a1004;}
  button.btn.primary:hover{filter:brightness(1.08);color:#1a1004;}

  /* ---- KPI cards ---- */
  .kpis{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:14px;
    margin-bottom:22px;
  }
  @media(max-width:980px){.kpis{grid-template-columns:repeat(2,1fr);}}
  .kpi{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:6px;
    padding:16px 18px;
    position:relative;
  }
  .kpi .label{
    font-family:var(--mono);
    font-size:10.5px;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:var(--text-dim);
    margin:0 0 8px;
  }
  .kpi .value{
    font-family:var(--disp);
    font-size:28px;
    font-weight:600;
  }
  .kpi .sub{font-size:11.5px;color:var(--text-dim);margin-top:4px;font-family:var(--mono);}
  .kpi.accent .value{color:var(--accent);}
  .kpi.ok .value{color:var(--ok);}
  .kpi.warn .value{color:var(--warn);}
  .kpi.bad .value{color:var(--bad);}

  /* ---- Charts ---- */
  .charts{
    display:grid;
    grid-template-columns:1.3fr 1fr 1fr;
    gap:14px;
    margin-bottom:22px;
  }
  @media(max-width:980px){.charts{grid-template-columns:1fr;}}
  .panel{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:6px;
    padding:18px 18px 14px;
  }
  .panel h3{
    font-family:var(--disp);
    font-size:14px;
    font-weight:600;
    letter-spacing:.03em;
    text-transform:uppercase;
    margin:0 0 12px;
    color:var(--text-dim);
  }
  .chart-holder{height:220px;position:relative;}
  .empty-note{
    color:var(--text-dim);font-size:12.5px;font-family:var(--mono);
    display:flex;align-items:center;justify-content:center;height:100%;text-align:center;padding:0 10px;
  }

  /* ---- Table panel ---- */
  .table-panel{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:6px;
    padding:18px 18px 8px;
  }
  .table-head{
    display:flex;justify-content:space-between;align-items:center;
    flex-wrap:wrap;gap:12px;margin-bottom:14px;
  }
  .table-head h3{
    font-family:var(--disp);font-size:16px;font-weight:600;
    text-transform:uppercase;letter-spacing:.03em;margin:0;
  }
  .table-controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  input.search{
    background:var(--panel-2);
    border:1px solid var(--border);
    border-radius:5px;
    padding:8px 12px;
    color:var(--text);
    font-family:var(--body);
    font-size:13px;
    min-width:220px;
  }
  input.search:focus{outline:none;border-color:var(--accent);}
  select.pagesize{
    background:var(--panel-2);border:1px solid var(--border);color:var(--text);
    border-radius:5px;padding:8px 10px;font-family:var(--body);font-size:13px;
  }
  .table-scroll{overflow-x:auto;border:1px solid var(--border);border-radius:5px;}
  table{width:100%;border-collapse:collapse;font-size:12.5px;font-family:var(--mono);white-space:nowrap;}
  thead th{
    background:var(--panel-2);
    text-align:left;
    padding:10px 14px;
    font-size:10.5px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--text-dim);
    cursor:pointer;
    user-select:none;
    border-bottom:1px solid var(--border);
    position:sticky;top:0;
  }
  thead th:hover{color:var(--accent);}
  thead th .arrow{opacity:.5;margin-left:4px;}
  tbody td{
    padding:9px 14px;
    border-bottom:1px solid #232c37;
    color:var(--text);
  }
  tbody tr:hover{background:#1f2733;}
  .status-tag{
    display:inline-block;padding:2px 9px;border-radius:11px;font-size:11px;font-weight:600;
    font-family:var(--body);
  }
  .status-tag.ok{background:var(--ok-soft);color:var(--ok);}
  .status-tag.warn{background:var(--warn-soft);color:var(--warn);}
  .status-tag.bad{background:var(--bad-soft);color:var(--bad);}
  .status-tag.neutral{background:#8b96a522;color:var(--text-dim);}
  .table-footer{
    display:flex;justify-content:space-between;align-items:center;
    padding:14px 4px;flex-wrap:wrap;gap:10px;
    font-family:var(--mono);font-size:12px;color:var(--text-dim);
  }
  .pager{display:flex;gap:8px;align-items:center;}
  .pager button{
    background:var(--panel-2);border:1px solid var(--border);color:var(--text);
    padding:6px 11px;border-radius:5px;cursor:pointer;font-family:var(--mono);font-size:12px;
  }
  .pager button:disabled{opacity:.35;cursor:not-allowed;}
  .pager button:hover:not(:disabled){border-color:var(--accent);color:var(--accent);}

  .msg-box{
    background:var(--panel);border:1px solid var(--border);border-radius:6px;
    padding:40px 24px;text-align:center;color:var(--text-dim);font-family:var(--mono);font-size:13px;
    line-height:1.7;
  }
  .msg-box strong{color:var(--bad);display:block;font-family:var(--disp);font-size:16px;margin-bottom:10px;text-transform:uppercase;letter-spacing:.03em;}
  .msg-box code{background:var(--panel-2);padding:2px 6px;border-radius:4px;color:var(--accent);}

  .skeleton{
    background:linear-gradient(90deg,var(--panel-2) 25%,#2a3441 37%,var(--panel-2) 63%);
    background-size:400% 100%;
    animation:shine 1.4s ease infinite;
    border-radius:4px;
  }
  @keyframes shine{0%{background-position:100% 0;}100%{background-position:0 0;}}
</style>
</head>
<body>
<div class="wrap">

  <!-- MANIFEST HEADER -->
  <div class="manifest">
    <div class="manifest-top">
      <div class="manifest-title-block">
        <p class="eyebrow">Manifest / Warehouse Ops</p>
        <h1>Warehouse Deliveries Report</h1>
        <p>collection: <span id="collName" style="color:var(--accent);font-family:var(--mono);">warehouse_deliveries</span> — ข้อมูลทั้งหมดแบบเรียลไทม์จาก Firestore</p>
      </div>
      <div class="status-block">
        <div class="status-pill"><span class="dot" id="statusDot"></span><span id="statusText">กำลังเชื่อมต่อ…</span></div>
        <div>Last sync: <span id="lastSync">—</span></div>
      </div>
    </div>
    <div class="manifest-bottom">
      <div class="barcode" id="barcode"></div>
      <div class="manifest-actions">
        <button class="btn" id="exportBtn">⤓ Export CSV</button>
        <button class="btn primary" id="refreshBtn">↻ Refresh</button>
      </div>
    </div>
  </div>

  <div id="appBody">
    <div class="msg-box" id="loadingBox">
      <strong>กำลังโหลดข้อมูล…</strong>
      กำลังดึงเอกสารทั้งหมดจาก collection <code>warehouse_deliveries</code>
    </div>
  </div>

</div>

<script type="module">
/* ======================================================================
   1) FIREBASE CONFIG — ใส่ค่าของโปรเจกต์ตัวเองตรงนี้
   หา config นี้ได้จาก Firebase Console > Project settings > General
   > Your apps > SDK setup and configuration
====================================================================== */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};
const COLLECTION_NAME = "warehouse_deliveries";
/* ====================================================================== */

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
// ถ้า Firestore Rules ของคุณต้องการการยืนยันตัวตน ให้เปิดใช้ 2 บรรทัดถัดไป
// และเพิ่ม signInAnonymously(auth) ก่อนเรียก getDocs (ต้องเปิด Anonymous auth ใน Firebase Console)
// import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
// const auth = getAuth();

let app, db;
let rawRows = [];
let columns = [];
let sortState = { key: null, dir: 1 };
let searchTerm = "";
let pageSize = 25;
let currentPage = 1;
let charts = {};

const $ = (sel) => document.querySelector(sel);
const statusDot = $("#statusDot");
const statusText = $("#statusText");
const lastSync = $("#lastSync");
const appBody = $("#appBody");

function buildBarcode(){
  const bc = $("#barcode");
  bc.innerHTML = "";
  for(let i=0;i<60;i++){
    const b = document.createElement("span");
    const h = Math.random()>0.7 ? 22 : (Math.random()>0.4?14:8);
    b.style.height = h+"px";
    b.style.opacity = Math.random()>0.5 ? "0.9" : "0.4";
    bc.appendChild(b);
  }
}
buildBarcode();

function setStatus(state, text){
  statusDot.className = "dot" + (state==="live" ? " live" : state==="err" ? " err" : "");
  statusText.textContent = text;
}

/* ---------- helpers to guess field roles from unknown schema ---------- */
function findField(keys, candidates){
  const lower = keys.map(k=>({orig:k, low:k.toLowerCase()}));
  for(const c of candidates){
    const hit = lower.find(k=>k.low===c);
    if(hit) return hit.orig;
  }
  for(const c of candidates){
    const hit = lower.find(k=>k.low.includes(c));
    if(hit) return hit.orig;
  }
  return null;
}

function toDate(val){
  if(!val) return null;
  if(val.toDate) return val.toDate(); // Firestore Timestamp
  if(val.seconds) return new Date(val.seconds*1000);
  const d = new Date(val);
  return isNaN(d.getTime()) ? null : d;
}

function classifyStatus(val){
  if(val==null) return "neutral";
  const s = String(val).toLowerCase();
  if(/(deliver|complete|success|ส่งแล้ว|สำเร็จ|เสร็จ)/.test(s)) return "ok";
  if(/(pending|process|transit|กำลัง|รอ)/.test(s)) return "warn";
  if(/(delay|cancel|fail|reject|ล่าช้า|ยกเลิก|ล้มเหลว)/.test(s)) return "bad";
  return "neutral";
}

function fmtCell(v){
  if(v==null) return "—";
  if(typeof v === "object"){
    const d = toDate(v);
    if(d) return d.toLocaleString("th-TH");
    try{ return JSON.stringify(v); }catch(e){ return String(v); }
  }
  return String(v);
}

/* ---------- main fetch ---------- */
async function loadData(){
  setStatus("connecting","กำลังเชื่อมต่อ…");
  appBody.innerHTML = `<div class="msg-box"><strong>กำลังโหลดข้อมูล…</strong>กำลังดึงเอกสารทั้งหมดจาก collection <code>${COLLECTION_NAME}</code></div>`;
  try{
    if(!app){
      app = initializeApp(firebaseConfig);
      db = getFirestore(app);
    }
    const snap = await getDocs(collection(db, COLLECTION_NAME));
    rawRows = [];
    snap.forEach(doc=>{
      rawRows.push({ __id: doc.id, ...doc.data() });
    });

    if(rawRows.length === 0){
      setStatus("live","เชื่อมต่อสำเร็จ");
      lastSync.textContent = new Date().toLocaleTimeString("th-TH");
      appBody.innerHTML = `<div class="msg-box"><strong>ไม่พบข้อมูล</strong>เชื่อมต่อ Firestore สำเร็จ แต่ collection <code>${COLLECTION_NAME}</code> ยังไม่มีเอกสาร</div>`;
      return;
    }

    // build union of columns, __id first
    const keySet = new Set();
    rawRows.forEach(r=>Object.keys(r).forEach(k=>{ if(k!=="__id") keySet.add(k); }));
    columns = ["__id", ...Array.from(keySet)];

    setStatus("live", `เชื่อมต่อสำเร็จ · ${rawRows.length} รายการ`);
    lastSync.textContent = new Date().toLocaleTimeString("th-TH");
    renderApp();
  }catch(err){
    console.error(err);
    setStatus("err","เชื่อมต่อไม่สำเร็จ");
    appBody.innerHTML = `
      <div class="msg-box">
        <strong>เชื่อมต่อ Firebase ไม่สำเร็จ</strong>
        ${err.message || err}<br/><br/>
        ตรวจสอบ 3 อย่างนี้:<br/>
        1) ใส่ค่า <code>firebaseConfig</code> ในไฟล์นี้ให้ถูกต้อง (จาก Firebase Console)<br/>
        2) ชื่อ collection ตรงกับ <code>${COLLECTION_NAME}</code> จริง<br/>
        3) Firestore Security Rules อนุญาตให้ <code>read</code> ได้ (ทดสอบชั่วคราวด้วย <code>allow read: if true;</code> หรือเปิด Anonymous Auth แล้ว sign in ก่อน)
      </div>`;
  }
}

/* ---------- render everything once data is ready ---------- */
function renderApp(){
  const keys = columns.filter(k=>k!=="__id");
  const dateField = findField(keys, ["date","deliverydate","delivery_date","created_at","createdat","timestamp","วันที่"]);
  const statusField = findField(keys, ["status","deliverystatus","state","สถานะ"]);
  const warehouseField = findField(keys, ["warehouse","warehousename","location","destination","คลัง","ปลายทาง"]);
  const qtyField = findField(keys, ["quantity","qty","amount","totalitems","จำนวน"]);

  appBody.innerHTML = `
    <div class="kpis" id="kpis"></div>
    <div class="charts">
      <div class="panel"><h3>ปริมาณการส่งตามช่วงเวลา</h3><div class="chart-holder"><canvas id="chartTime"></canvas></div></div>
      <div class="panel"><h3>สัดส่วนสถานะ</h3><div class="chart-holder"><canvas id="chartStatus"></canvas></div></div>
      <div class="panel"><h3>คลัง / ปลายทางยอดนิยม</h3><div class="chart-holder"><canvas id="chartWarehouse"></canvas></div></div>
    </div>
    <div class="table-panel">
      <div class="table-head">
        <h3>รายการทั้งหมด (${rawRows.length})</h3>
        <div class="table-controls">
          <input type="text" class="search" id="searchInput" placeholder="ค้นหาในทุกคอลัมน์…">
          <select class="pagesize" id="pageSizeSelect">
            <option value="25">25 / หน้า</option>
            <option value="50">50 / หน้า</option>
            <option value="100">100 / หน้า</option>
            <option value="99999">ทั้งหมด</option>
          </select>
        </div>
      </div>
      <div class="table-scroll"><table id="dataTable"><thead></thead><tbody></tbody></table></div>
      <div class="table-footer">
        <div id="footerInfo"></div>
        <div class="pager">
          <button id="prevPage">‹ ก่อนหน้า</button>
          <span id="pageIndicator" style="min-width:70px;text-align:center;"></span>
          <button id="nextPage">ถัดไป ›</button>
        </div>
      </div>
    </div>
  `;

  renderKPIs({ dateField, statusField, warehouseField, qtyField });
  renderCharts({ dateField, statusField, warehouseField, qtyField });
  renderTableHead();
  currentPage = 1;
  renderTableBody();

  $("#searchInput").addEventListener("input", (e)=>{ searchTerm = e.target.value.toLowerCase(); currentPage=1; renderTableBody(); });
  $("#pageSizeSelect").addEventListener("change", (e)=>{ pageSize = parseInt(e.target.value); currentPage=1; renderTableBody(); });
  $("#prevPage").addEventListener("click", ()=>{ if(currentPage>1){ currentPage--; renderTableBody(); } });
  $("#nextPage").addEventListener("click", ()=>{ currentPage++; renderTableBody(); });
}

function renderKPIs({ statusField, qtyField, warehouseField }){
  const total = rawRows.length;
  let okCount=0, warnCount=0, badCount=0;
  if(statusField){
    rawRows.forEach(r=>{
      const c = classifyStatus(r[statusField]);
      if(c==="ok") okCount++; else if(c==="warn") warnCount++; else if(c==="bad") badCount++;
    });
  }
  let qtySum = null;
  if(qtyField){
    qtySum = rawRows.reduce((s,r)=>{
      const n = Number(r[qtyField]);
      return s + (isNaN(n)?0:n);
    },0);
  }
  const uniqueWh = warehouseField ? new Set(rawRows.map(r=>r[warehouseField]).filter(Boolean)).size : null;

  const cards = [
    { label:"Total Deliveries", value: total, sub:"เอกสารทั้งหมด", cls:"" },
    { label:"Delivered / OK", value: statusField ? okCount : "—", sub: statusField? `${((okCount/total)*100||0).toFixed(0)}% ของทั้งหมด` : "ไม่พบฟิลด์สถานะ", cls:"ok" },
    { label:"Pending / In Transit", value: statusField ? warnCount : "—", sub: statusField? "อยู่ระหว่างดำเนินการ" : "ไม่พบฟิลด์สถานะ", cls:"warn" },
    { label:"Delayed / Cancelled", value: statusField ? badCount : "—", sub: statusField? "ต้องติดตาม" : "ไม่พบฟิลด์สถานะ", cls:"bad" },
    { label: qtyField ? "Total Quantity" : "Unique Warehouses", value: qtyField ? qtySum.toLocaleString() : (uniqueWh ?? "—"), sub: qtyField ? "รวมจำนวนสินค้า" : "จำนวนคลัง/ปลายทาง", cls:"accent" },
  ];

  $("#kpis").innerHTML = cards.map(c=>`
    <div class="kpi ${c.cls}">
      <p class="label">${c.label}</p>
      <div class="value">${c.value}</div>
      <div class="sub">${c.sub}</div>
    </div>
  `).join("");
}

function destroyChart(key){ if(charts[key]){ charts[key].destroy(); delete charts[key]; } }

function renderCharts({ dateField, statusField, warehouseField }){
  const chartFont = { family:"IBM Plex Mono", size:11 };
  Chart.defaults.color = "#8b96a5";
  Chart.defaults.font.family = "IBM Plex Mono";
  Chart.defaults.font.size = 11;

  // Time chart
  destroyChart("time");
  const timeCanvas = $("#chartTime");
  if(dateField){
    const counts = {};
    rawRows.forEach(r=>{
      const d = toDate(r[dateField]);
      if(!d) return;
      const key = d.toLocaleDateString("th-TH", { year:"2-digit", month:"short", day:"2-digit" });
      counts[key] = (counts[key]||0)+1;
    });
    const labels = Object.keys(counts);
    charts.time = new Chart(timeCanvas, {
      type:"bar",
      data:{ labels, datasets:[{ label:"จำนวนรายการ", data:labels.map(l=>counts[l]), backgroundColor:"#ff7a1a", borderRadius:3, maxBarThickness:26 }]},
      options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{ x:{grid:{display:false}}, y:{grid:{color:"#232c37"}, beginAtZero:true, ticks:{precision:0}} } }
    });
  } else {
    timeCanvas.parentElement.innerHTML = `<div class="empty-note">ไม่พบฟิลด์วันที่ในข้อมูล<br/>(เช่น date, deliveryDate, timestamp)</div>`;
  }

  // Status donut
  destroyChart("status");
  const statusCanvas = $("#chartStatus");
  if(statusField){
    const counts = {};
    rawRows.forEach(r=>{
      const v = r[statusField] ?? "ไม่ระบุ";
      counts[v] = (counts[v]||0)+1;
    });
    const labels = Object.keys(counts);
    const palette = ["#3dd68c","#ffc145","#ff5470","#8b96a5","#ff7a1a","#5b9bf0"];
    charts.status = new Chart(statusCanvas, {
      type:"doughnut",
      data:{ labels, datasets:[{ data:labels.map(l=>counts[l]), backgroundColor: labels.map((_,i)=>palette[i%palette.length]), borderColor:"#1a2029", borderWidth:2 }]},
      options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:"bottom", labels:{ boxWidth:10, padding:10 } } }, cutout:"62%" }
    });
  } else {
    statusCanvas.parentElement.innerHTML = `<div class="empty-note">ไม่พบฟิลด์สถานะในข้อมูล<br/>(เช่น status, deliveryStatus)</div>`;
  }

  // Warehouse bar
  destroyChart("warehouse");
  const whCanvas = $("#chartWarehouse");
  if(warehouseField){
    const counts = {};
    rawRows.forEach(r=>{
      const v = r[warehouseField] ?? "ไม่ระบุ";
      counts[v] = (counts[v]||0)+1;
    });
    const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,8);
    charts.warehouse = new Chart(whCanvas, {
      type:"bar",
      data:{ labels: sorted.map(s=>s[0]), datasets:[{ data: sorted.map(s=>s[1]), backgroundColor:"#5b9bf0", borderRadius:3, maxBarThickness:18 }]},
      options:{ indexAxis:"y", responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{ x:{grid:{color:"#232c37"}, beginAtZero:true, ticks:{precision:0}}, y:{grid:{display:false}} } }
    });
  } else {
    whCanvas.parentElement.innerHTML = `<div class="empty-note">ไม่พบฟิลด์คลัง/ปลายทางในข้อมูล<br/>(เช่น warehouse, destination)</div>`;
  }
}

function renderTableHead(){
  const thead = document.querySelector("#dataTable thead");
  thead.innerHTML = "<tr>" + columns.map(c=>{
    const arrow = sortState.key===c ? (sortState.dir===1?"↑":"↓") : "";
    return `<th data-col="${c}">${c==="__id"?"ID":c}<span class="arrow">${arrow}</span></th>`;
  }).join("") + "</tr>";
  thead.querySelectorAll("th").forEach(th=>{
    th.addEventListener("click", ()=>{
      const col = th.dataset.col;
      if(sortState.key===col) sortState.dir *= -1;
      else { sortState.key = col; sortState.dir = 1; }
      renderTableHead();
      renderTableBody();
    });
  });
}

function getFilteredSorted(){
  let rows = rawRows;
  if(searchTerm){
    rows = rows.filter(r=> columns.some(c=> fmtCell(r[c]).toLowerCase().includes(searchTerm)));
  }
  if(sortState.key){
    rows = [...rows].sort((a,b)=>{
      let av = a[sortState.key], bv = b[sortState.key];
      const ad = toDate(av), bd = toDate(bv);
      if(ad && bd) return (ad-bd) * sortState.dir;
      av = fmtCell(av); bv = fmtCell(bv);
      const an = Number(av), bn = Number(bv);
      if(!isNaN(an) && !isNaN(bn) && av!=="" && bv!=="") return (an-bn)*sortState.dir;
      return av.localeCompare(bv, "th") * sortState.dir;
    });
  }
  return rows;
}

function renderTableBody(){
  const rows = getFilteredSorted();
  const totalPages = Math.max(1, Math.ceil(rows.length/pageSize));
  currentPage = Math.min(currentPage, totalPages);
  const start = (currentPage-1)*pageSize;
  const pageRows = rows.slice(start, start+pageSize);

  const statusField = findField(columns, ["status","deliverystatus","state","สถานะ"]);

  const tbody = document.querySelector("#dataTable tbody");
  tbody.innerHTML = pageRows.map(r=>{
    return "<tr>" + columns.map(c=>{
      if(c===statusField && r[c]!=null){
        const cls = classifyStatus(r[c]);
        return `<td><span class="status-tag ${cls}">${fmtCell(r[c])}</span></td>`;
      }
      return `<td>${fmtCell(r[c])}</td>`;
    }).join("") + "</tr>";
  }).join("");

  $("#footerInfo").textContent = `แสดง ${rows.length===0?0:start+1}–${Math.min(start+pageSize,rows.length)} จาก ${rows.length} รายการ (ทั้งหมด ${rawRows.length})`;
  $("#pageIndicator").textContent = `${currentPage} / ${totalPages}`;
  $("#prevPage").disabled = currentPage<=1;
  $("#nextPage").disabled = currentPage>=totalPages;
}

/* ---------- CSV export ---------- */
function exportCSV(){
  if(rawRows.length===0) return;
  const rows = getFilteredSorted();
  const escape = (v)=> `"${String(v).replace(/"/g,'""')}"`;
  const lines = [ columns.map(escape).join(",") ];
  rows.forEach(r=>{
    lines.push(columns.map(c=>escape(fmtCell(r[c]))).join(","));
  });
  const blob = new Blob(["\uFEFF"+lines.join("\n")], { type:"text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `warehouse_deliveries_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

$("#refreshBtn").addEventListener("click", loadData);
$("#exportBtn").addEventListener("click", exportCSV);

loadData();
</script>
