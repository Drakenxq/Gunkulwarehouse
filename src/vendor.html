<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GUNKUL Warehouse | Vendor Delivery Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@500;600;700&family=Sarabun:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy-950:#060f1c;
    --navy-900:#0a1929;
    --navy-800:#0f2540;
    --navy-700:#16324f;
    --navy-600:#1d3f61;
    --navy-500:#2a4f76;
    --gold-300:#f0d896;
    --gold-400:#e8c468;
    --gold-600:#c89b3c;
    --text-light:#eaf1f8;
    --text-muted:#8fa3b8;
    --text-dim:#5f7590;
    --success:#34d399;
    --success-dim:rgba(52,211,153,.14);
    --warning:#fbbf24;
    --warning-dim:rgba(251,191,36,.14);
    --danger:#f87171;
    --danger-dim:rgba(248,113,113,.14);
    --info:#60a5fa;
    --info-dim:rgba(96,165,250,.14);
    --glass-bg:rgba(255,255,255,.035);
    --glass-bg-hover:rgba(255,255,255,.06);
    --glass-border:rgba(232,196,104,.14);
    --radius:16px;
  }
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.001ms !important; transition-duration:.001ms !important;}
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    font-family:'Sarabun',sans-serif;
    background:
      radial-gradient(ellipse 900px 500px at 85% -10%, rgba(232,196,104,.08), transparent 60%),
      radial-gradient(ellipse 700px 500px at -10% 110%, rgba(96,165,250,.05), transparent 60%),
      linear-gradient(180deg, var(--navy-950), var(--navy-900) 40%, var(--navy-950));
    color:var(--text-light);
    min-height:100vh;
    background-attachment:fixed;
  }
  .wrap{position:relative; z-index:1; max-width:1280px; margin:0 auto; padding:0 24px 64px;}

  /* header */
  header{
    display:flex; align-items:center; justify-content:space-between; gap:16px;
    padding:28px 0 24px; flex-wrap:wrap;
  }
  .brand{display:flex; align-items:center; gap:14px;}
  .brand-mark{
    width:55px; height:50px; border-radius:12px;
    background:linear-gradient(135deg, var(--gold-300), var(--gold-600));
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 0 0 1px rgba(232,196,104,.25), 0 8px 20px -6px rgba(232,196,104,.4);
    flex-shrink:0;
  }
  .brand-mark svg{width:24px; height:24px;}
  .brand h1{font-family:'Kanit',sans-serif; font-size:19px; font-weight:600; letter-spacing:.2px;}
  .brand p{font-size:13px; color:var(--text-muted); margin-top:2px;}
  .header-tag{
    font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--gold-400);
    background:var(--glass-bg); border:1px solid var(--glass-border);
    padding:6px 12px; border-radius:999px; letter-spacing:.5px;
  }
  .refresh-btn{
    display:flex; align-items:center; gap:7px; font-family:'Sarabun',sans-serif; font-size:12.5px; font-weight:600;
    color:var(--text-light); background:var(--glass-bg); border:1px solid var(--glass-border);
    padding:7px 14px; border-radius:999px; cursor:pointer; transition:background .15s, border-color .15s, opacity .15s;
  }
  .refresh-btn:hover{background:var(--glass-bg-hover); border-color:rgba(232,196,104,.3);}
  .refresh-btn:disabled{opacity:.55; cursor:default;}
  .refresh-btn svg{width:14px; height:14px; stroke:var(--gold-400); flex-shrink:0;}
  .refresh-btn.spinning svg{animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* stats */
  .stats{
    display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); gap:14px;
    margin-bottom:28px;
  }
  .stat-card{
    background:var(--glass-bg); border:1px solid var(--glass-border); border-radius:var(--radius);
    padding:18px 20px; backdrop-filter:blur(12px);
    opacity:0; transform:translateY(10px); animation:rise .5s ease forwards;
  }
  .stat-card .label{font-size:12.5px; color:var(--text-muted); margin-bottom:8px;}
  .stat-card .value{font-family:'Kanit',sans-serif; font-size:30px; font-weight:600; color:var(--text-light);}
  .stat-card .value span{font-size:15px; color:var(--text-dim); font-weight:500; margin-left:4px;}
  .stat-card.gold .value{color:var(--gold-400);}
  .stat-card.warn .value{color:var(--warning);}
  .stat-card.danger .value{color:var(--danger);}

  /* controls */
  .controls{
    display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin-bottom:22px;
  }
  .search-box{
    flex:1 1 260px; position:relative;
  }
  .search-box input{
    width:100%; padding:12px 16px 12px 42px; border-radius:12px;
    background:var(--glass-bg); border:1px solid var(--glass-border);
    color:var(--text-light); font-family:'Sarabun',sans-serif; font-size:14.5px;
    outline:none; transition:border-color .2s, background .2s;
  }
  .search-box input::placeholder{color:var(--text-dim);}
  .search-box input:focus{border-color:var(--gold-400); background:var(--glass-bg-hover);}
  .search-box svg{position:absolute; left:14px; top:50%; transform:translateY(-50%); width:16px; height:16px; stroke:var(--text-dim);}
  .chips{display:flex; gap:8px; flex-wrap:wrap;}
  .chip{
    font-size:13px; padding:9px 15px; border-radius:999px; cursor:pointer;
    background:var(--glass-bg); border:1px solid var(--glass-border); color:var(--text-muted);
    transition:all .18s; white-space:nowrap;
  }
  .chip:hover{color:var(--text-light); border-color:rgba(232,196,104,.3);}
  .chip:focus-visible, .search-box input:focus-visible, .vendor-card:focus-visible{
    outline:2px solid var(--gold-400); outline-offset:2px;
  }
  .chip.active{
    background:linear-gradient(135deg, var(--gold-300), var(--gold-600));
    color:var(--navy-950); border-color:transparent; font-weight:600;
  }

  /* vendor grid */
  .grid{
    display:grid; grid-template-columns:repeat(auto-fill,minmax(360px,1fr)); gap:18px;
    align-items:start;
  }
  .vendor-card{
    background:var(--glass-bg); border:1px solid var(--glass-border); border-radius:var(--radius);
    backdrop-filter:blur(12px); cursor:pointer; overflow:hidden;
    transition:border-color .2s, background .2s, box-shadow .2s;
    opacity:0; transform:translateY(14px); animation:rise .55s ease forwards;
  }
  .vendor-card:hover{background:var(--glass-bg-hover); border-color:rgba(232,196,104,.3);
    box-shadow:0 12px 28px -14px rgba(0,0,0,.5);}
  .vendor-head{display:flex; gap:14px; padding:20px 22px;}
  .avatar{
    width:48px; height:48px; border-radius:12px; flex-shrink:0;
    background:linear-gradient(155deg, var(--navy-600), var(--navy-800));
    border:1px solid var(--glass-border);
    display:flex; align-items:center; justify-content:center;
  }
  .avatar span{font-family:'Kanit',sans-serif; font-weight:600; font-size:15px; color:var(--gold-400);}
  .vendor-info{flex:1; min-width:0;}
  .vendor-info h3{font-family:'Kanit',sans-serif; font-size:15.5px; font-weight:600; line-height:1.35;}
  .vendor-info .cat{font-size:12.5px; color:var(--text-muted); margin-top:3px; display:flex; align-items:center; gap:5px;}
  .vendor-meta{display:flex; gap:16px; margin-top:12px; font-size:12.5px; color:var(--text-dim);}
  .vendor-meta b{color:var(--text-light); font-weight:600;}
  .chevron{width:16px; height:16px; stroke:var(--text-dim); transition:transform .25s; flex-shrink:0; margin-top:4px;}
  .vendor-card.open .chevron{transform:rotate(180deg); stroke:var(--gold-400);}

  .po-panel{max-height:0; overflow:hidden; transition:max-height .35s ease;}
  .vendor-card.open .po-panel{max-height:2000px;}
  .po-panel-inner{padding:0 22px 20px; border-top:1px solid var(--glass-border);}
  .po-row{padding:16px 0; border-bottom:1px dashed rgba(232,196,104,.12);}
  .po-row:last-child{border-bottom:none; padding-bottom:2px;}
  .po-row-top{display:flex; justify-content:space-between; align-items:flex-start; gap:10px; flex-wrap:wrap;}
  .po-num{font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--gold-400); font-weight:500;}
  .po-desc{font-size:13px; color:var(--text-light); margin-top:4px;}
  .po-qty{font-size:12px; color:var(--text-dim); margin-top:3px; font-family:'IBM Plex Mono',monospace;}
  .status-pill{
    font-size:11.5px; padding:4px 10px; border-radius:999px; font-weight:600; white-space:nowrap;
  }
  .status-complete{background:var(--success-dim); color:var(--success);}
  .status-partial{background:var(--warning-dim); color:var(--warning);}
  .status-pending{background:var(--info-dim); color:var(--info);}
  .status-late{background:var(--danger-dim); color:var(--danger);}

  /* progress bar + table detail */
  .po-detail{margin-top:14px;}
  .po-progress{width:100%; margin-bottom:14px;}
  .po-progress-head{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:7px; gap:10px;}
  .po-progress-total{font-family:'Kanit',sans-serif; font-weight:600; font-size:15.5px; color:var(--text-light); white-space:nowrap;}
  .po-progress-total small{font-size:12px; color:var(--text-dim); font-weight:500; margin-left:3px;}
  .po-progress-pct{font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--gold-400); font-weight:600; white-space:nowrap;}
  .po-progress-track{
    width:100%; height:24px; border-radius:8px; background:rgba(255,255,255,.04);
    border:1px solid var(--glass-border); overflow:hidden; display:flex;
  }
  .po-progress-seg{
    height:100%; position:relative; min-width:3px;
    transition:filter .15s;
  }
  .po-progress-seg:hover{filter:brightness(1.15);}
  .po-progress-seg:not(:last-child){box-shadow:inset -1px 0 0 rgba(6,15,28,.55);}
  .po-progress-remaining{
    background:repeating-linear-gradient(45deg, rgba(255,255,255,.05), rgba(255,255,255,.05) 5px, transparent 5px, transparent 10px);
  }
  .po-progress-legend{
    display:flex; flex-wrap:wrap; column-gap:14px; row-gap:5px; margin-top:9px;
    font-size:11.5px; color:var(--text-dim); font-family:'IBM Plex Mono',monospace;
  }
  .po-progress-legend .dot{
    display:inline-block; width:8px; height:8px; border-radius:2px; margin-right:5px; flex-shrink:0;
  }
  .po-progress-legend b{color:var(--text-light); font-weight:600;}
  .po-table-wrap{overflow-x:auto; border-radius:10px; border:1px solid var(--glass-border);}
  table.po-table{width:100%; border-collapse:collapse; font-size:11.5px; min-width:380px;}
  table.po-table thead th{
    text-align:left; font-weight:600; color:var(--text-muted); padding:8px 10px;
    background:rgba(255,255,255,.03); border-bottom:1px solid var(--glass-border); font-size:10.5px; white-space:nowrap;
  }
  table.po-table td{padding:7px 10px; border-bottom:1px solid rgba(232,196,104,.08); color:var(--text-light); white-space:nowrap;}
  table.po-table tbody tr:last-child td{border-bottom:none;}
  table.po-table td.date{font-family:'IBM Plex Mono',monospace; color:var(--text-muted);}
  table.po-table td.num{font-family:'IBM Plex Mono',monospace; text-align:right;}
  table.po-table tr.row-remaining td{color:var(--text-dim); font-style:italic;}
  .po-empty{font-size:12px; color:var(--text-dim); padding:10px 2px;}

  .empty{
    text-align:center; padding:70px 20px; color:var(--text-muted);
    grid-column:1/-1;
  }
  .empty svg{width:40px; height:40px; stroke:var(--text-dim); margin-bottom:14px;}

  @keyframes rise{to{opacity:1; transform:translateY(0);}}

  /* vendor detail modal */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(4,10,18,.72); backdrop-filter:blur(3px);
    display:none; align-items:flex-start; justify-content:center; z-index:50; padding:32px 16px; overflow-y:auto;
  }
  .modal-overlay.show{display:flex;}
  .modal-panel{
    width:100%; max-width:640px; background:var(--navy-900); border:1px solid var(--glass-border);
    border-radius:20px; overflow:hidden; box-shadow:0 30px 80px -20px rgba(0,0,0,.6);
    opacity:0; transform:translateY(16px) scale(.98); animation:modalIn .3s ease forwards;
  }
  @keyframes modalIn{to{opacity:1; transform:translateY(0) scale(1);}}
  .modal-head{
    position:relative; padding:24px 26px 20px;
    background:linear-gradient(135deg, var(--navy-700), var(--navy-800));
    border-bottom:1px solid var(--glass-border);
  }
  .modal-head .m-tag{font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--gold-300); opacity:.85; letter-spacing:.4px;}
  .modal-head h2{font-family:'Kanit',sans-serif; font-size:19px; font-weight:600; margin-top:6px; padding-right:34px; line-height:1.35;}
  .modal-close{
    position:absolute; top:18px; right:18px; width:32px; height:32px; border-radius:10px; border:none;
    background:rgba(255,255,255,.08); color:var(--text-light); cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition:background .15s;
  }
  .modal-close:hover{background:rgba(255,255,255,.16);}
  .modal-close svg{width:16px; height:16px;}
  .status-badge{
    display:inline-flex; align-items:center; gap:6px; margin-top:12px; font-size:12.5px; font-weight:600;
    padding:6px 12px; border-radius:999px;
  }
  .status-badge.active{background:var(--success-dim); color:var(--success);}
  .status-badge.inactive{background:rgba(255,255,255,.06); color:var(--text-dim);}
  .status-badge .dot2{width:6px; height:6px; border-radius:50%; background:currentColor;}

  .modal-body{padding:22px 26px 26px; max-height:74vh; overflow-y:auto;}
  .m-stats{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:22px;}
  .m-stat{
    background:var(--glass-bg); border:1px solid var(--glass-border); border-radius:12px; padding:13px 14px; text-align:center;
  }
  .m-stat .m-label{font-size:11px; color:var(--text-muted); margin-bottom:6px;}
  .m-stat .m-value{font-family:'Kanit',sans-serif; font-weight:600; font-size:17px; color:var(--gold-400);}

  .m-charts{display:grid; grid-template-columns:minmax(0,1fr) minmax(0,1fr); gap:14px; margin-bottom:22px;}
  .m-panel{
    background:var(--glass-bg); border:1px solid var(--glass-border); border-radius:14px; padding:16px;
    min-width:0;
  }
  .m-panel h4{font-size:12px; color:var(--text-muted); font-weight:600; margin-bottom:12px; overflow-wrap:break-word;}
  .donut-legend{margin-top:10px; display:flex; flex-direction:column; gap:6px;}
  .donut-legend div{display:flex; align-items:center; justify-content:space-between; font-size:11.5px; color:var(--text-muted); gap:8px;}
  .donut-legend .dl-name{display:flex; align-items:center; gap:6px; color:var(--text-light); min-width:0;}
  .donut-legend .dl-name span{overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .donut-legend .dl-dot{width:8px; height:8px; border-radius:2px; flex-shrink:0;}
  .donut-legend b{color:var(--gold-400); font-family:'IBM Plex Mono',monospace; flex-shrink:0;}

  .m-tags{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:20px;}
  .m-tag-chip{
    font-size:12px; padding:6px 12px; border-radius:999px; background:var(--glass-bg);
    border:1px solid var(--glass-border); color:var(--text-muted);
  }

  .m-section-title{display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;}
  .m-section-title span{font-size:13px; font-weight:600; color:var(--text-light);}

  .m-history{border:1px solid var(--glass-border); border-radius:14px; overflow:hidden;}
  .m-history-row{border-bottom:1px solid rgba(232,196,104,.1);}
  .m-history-row:last-child{border-bottom:none;}
  .m-history-head{
    display:flex; justify-content:space-between; align-items:center; gap:10px; padding:13px 16px; cursor:pointer;
    transition:background .15s;
  }
  .m-history-head:hover{background:rgba(255,255,255,.03);}
  .m-history-head .m-hnum{font-family:'IBM Plex Mono',monospace; color:var(--gold-400); font-size:13px;}
  .m-history-head .m-hdate{font-size:11.5px; color:var(--text-dim); margin-top:2px;}
  .m-history-head .m-hcount{font-size:12px; color:var(--text-muted); white-space:nowrap;}
  .m-hchevron{width:14px; height:14px; stroke:var(--text-dim); transition:transform .2s; flex-shrink:0;}
  .m-history-row.open .m-hchevron{transform:rotate(90deg); stroke:var(--gold-400);}
  .m-history-body{max-height:0; overflow:hidden; transition:max-height .35s ease;}
  .m-history-row.open .m-history-body{max-height:3000px;}
  .m-history-body-inner{padding:4px 16px 16px; border-top:1px dashed rgba(232,196,104,.12);}

  @media (max-width:560px){
    .m-charts{grid-template-columns:1fr;}
  }

  @media (max-width:640px){
    header{padding:20px 0 18px;}
    .wrap{padding:0 16px 48px;}
    .grid{grid-template-columns:1fr;}
    .vendor-meta{flex-wrap:wrap; gap:10px;}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand">
      <div class="brand-mark">
        <img src="./svg/logo-default.svg" alt="Logo" style="width:50px; height:50px; object-fit:contain;">
      </div>
      <div>
        <h1>GUNKUL Warehouse</h1>
        <p>รายการผู้ขาย (Ven/Supplier)</p>
      </div>
    </div>
    <div style="display:flex; align-items:center; gap:10px;">
      <div class="header-tag" id="connTag">กำลังเชื่อมต่อ...</div>
      <button class="refresh-btn" id="refreshBtn" type="button" title="ดึงข้อมูลล่าสุด">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 4v5h-5"/></svg>
        รีเฟรช
      </button>
    </div>
  </header>

  <div class="stats" id="stats"></div>

  <div class="controls">
    <div class="search-box">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="searchInput" type="text" placeholder="ค้นหาบริษัท, เลขที่ PO หรือรายการสินค้า...">
    </div>
    <div class="chips" id="statusChips"></div>
  </div>

  <div class="grid" id="vendorGrid"></div>

</div>

<div class="modal-overlay" id="vendorModalOverlay">
  <div class="modal-panel" id="vendorModalPanel"></div>
</div>


<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// same config as src/js/firebase.js
const firebaseConfig = {
  apiKey: "AIzaSyAkPFzgT7hLAxPVI129F-vRzA65MIx2VIs",
  authDomain: "gunkul-my-task-system.firebaseapp.com",
  projectId: "gunkul-my-task-system",
  storageBucket: "gunkul-my-task-system.firebasestorage.app",
  messagingSenderId: "877006770872",
  appId: "1:877006770872:web:ec56ec0089512899811a4d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const STATUS = {
  complete: {label:'ทำรับสมบูรณ์', cls:'status-complete', dot:'#34d399'},
  partial:  {label:'ส่งบางส่วน', cls:'status-partial', dot:'#fbbf24'},
  pending:  {label:'รอดำเนินการ', cls:'status-pending', dot:'#60a5fa'},
  late:     {label:'ล่าช้า', cls:'status-late', dot:'#f87171'}
};

const CATEGORY_ICON = {
  solar:'M12 4V2M12 22v-2M4.9 4.9 3.5 3.5M20.5 20.5l-1.4-1.4M4.9 19.1l-1.4 1.4M20.5 3.5l-1.4 1.4M2 12H4M20 12h2M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8Z',
  cable:'M4 12h3l2-5 3 10 2-5h6',
  inverter:'M4 5h16v10H4z M8 19h8 M9 8h2v4H9z M13 9h2v3h-2z',
  steel:'M3 20 12 4l9 16H3Z M8 20l4-8 4 8',
  battery:'M7 8h9a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-6a2 2 0 0 1 2-2Z M18 11v2 M4 8h1v8H4z',
  electric:'M13 2 4 14h7l-1 8 9-12h-7l1-8Z'
};

let vendors = [];

// --- helpers: map a raw warehouse_deliveries doc into the vendor/PO shape the UI expects ---
const CATEGORY_LABEL = {
  solar:'แผงโซล่าเซลล์/อุปกรณ์', cable:'สายไฟและเคเบิล', inverter:'อินเวอร์เตอร์',
  steel:'โครงสร้างเหล็ก', battery:'แบตเตอรี่กักเก็บพลังงาน', electric:'อุปกรณ์ไฟฟ้าทั่วไป'
};
function guessIcon(text){
  const t = text.toLowerCase();
  if(/panel|โซล่า|solar/.test(t)) return 'solar';
  if(/cable|สายไฟ|wire/.test(t)) return 'cable';
  if(/inverter|อินเวอร์เตอร์/.test(t)) return 'inverter';
  if(/steel|เหล็ก|structure|mounting|tracker/.test(t)) return 'steel';
  if(/battery|แบตเตอรี่|bess/.test(t)) return 'battery';
  return 'electric';
}
function makeInitials(name){
  let n = (name||'').replace(/บริษัท|บจก\.?|ห้างหุ้นส่วนจำกัด|หจก\.?|จำกัด\s*\(มหาชน\)|จำกัด/g,'').trim();
  if(!n) n = name || '?';
  return n.slice(0,2) || '?';
}

// Turns the flat list of warehouse_deliveries documents into vendors -> PO -> deliveries
function buildVendorsFromDocs(docsData){
  const vendorMap = new Map(); // sender -> Map(poKey -> po)

  docsData.forEach(d=>{
    const sender = d.sender || 'ไม่ระบุผู้ขาย/ผู้ส่ง';
    if(!vendorMap.has(sender)) vendorMap.set(sender, new Map());
    const poMap = vendorMap.get(sender);
    const invoice = d.invoice || d.note || '(ไม่มีเลขที่)';

    (d.items || []).forEach(item=>{
      const key = invoice + '||' + item.name + '||' + (item.unit || '');
      if(!poMap.has(key)){
        poMap.set(key, {
          poNumber: invoice,
          itemDesc: item.name || '-',
          unit: item.unit || '-',
          qtyTotal: 0,
          orderDate: d.date,
          status: 'complete', // this dataset only records goods already received
          deliveries: []
        });
      }
      const po = poMap.get(key);
      const qty = Number(item.qty) || 0;
      po.qtyTotal += qty;
      if(d.date && d.date < po.orderDate) po.orderDate = d.date;
      po.deliveries.push({
        date: d.date,
        qty,
        receiver: d.receivedBy || '-',
        note: d.note || ''
      });
    });
  });

  const built = [];
  let idx = 0;
  for(const [sender, poMap] of vendorMap.entries()){
    idx++;
    const pos = Array.from(poMap.values()).map(po=>{
      po.deliveries.sort((a,b)=>(a.date||'').localeCompare(b.date||''));
      return po;
    }).sort((a,b)=>(b.orderDate||'').localeCompare(a.orderDate||''));
    const allText = pos.map(p=>p.itemDesc).join(' ');
    const icon = guessIcon(allText);
    built.push({
      id: 'v'+idx,
      name: sender,
      category: CATEGORY_LABEL[icon],
      icon,
      initials: makeInitials(sender),
      pos
    });
  }
  built.sort((a,b)=>a.name.localeCompare(b.name,'th'));
  return built;
}

const fmtDate = iso => new Date(iso + 'T00:00:00').toLocaleDateString('th-TH', {day:'numeric', month:'short', year:'numeric'});
const fmtShort = iso => new Date(iso + 'T00:00:00').toLocaleDateString('th-TH', {day:'numeric', month:'short'});
const fmtNum = n => n.toLocaleString('th-TH');

// groups a vendor's item-level po entries (one per invoice+item) into invoice-level rows
function getInvoiceGroups(vendor){
  const map = new Map();
  vendor.pos.forEach(po=>{
    if(!map.has(po.poNumber)) map.set(po.poNumber, { invoice: po.poNumber, items: [], date: po.orderDate });
    const g = map.get(po.poNumber);
    g.items.push(po);
    if(po.orderDate && po.orderDate < g.date) g.date = po.orderDate;
  });
  return Array.from(map.values()).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
}

let statusFilter = 'all';
let searchQuery = '';

function computeStats(){
  const ym = new Date().toISOString().slice(0,7);
  let totalPO = 0, deliveriesThisMonth = 0, pendingPO = 0;
  vendors.forEach(v => {
    totalPO += getInvoiceGroups(v).length;
    v.pos.forEach(po => {
      if(po.status !== 'complete') pendingPO++;
      po.deliveries.forEach(d => { if((d.date||'').startsWith(ym)) deliveriesThisMonth++; });
    });
  });
  return { totalVendors: vendors.length, totalPO, deliveriesThisMonth, pendingPO };
}

function renderStats(){
  const s = computeStats();
  const cards = [
    {label:'ผู้ขายทั้งหมด', value:s.totalVendors, unit:'บริษัท', cls:''},
    {label:'PO ทั้งหมด', value:s.totalPO, unit:'รายการ', cls:'gold'},
    {label:'ส่งของเดือนนี้', value:s.deliveriesThisMonth, unit:'ครั้ง', cls:''},
    {label:'รอดำเนินการ / ค้างส่ง', value:s.pendingPO, unit:'PO', cls:'warn'}
  ];
  document.getElementById('stats').innerHTML = cards.map((c,i)=>`
    <div class="stat-card ${c.cls}" style="animation-delay:${i*70}ms">
      <div class="label">${c.label}</div>
      <div class="value" data-target="${c.value}">0<span>${c.unit}</span></div>
    </div>`).join('');
  document.querySelectorAll('.stat-card .value').forEach(el=>{
    const target = +el.dataset.target;
    const unitHTML = el.querySelector('span').outerHTML;
    let start = null;
    const dur = 700;
    function step(ts){
      if(!start) start = ts;
      const p = Math.min((ts-start)/dur, 1);
      const eased = 1 - Math.pow(1-p, 3);
      el.innerHTML = Math.round(eased*target) + unitHTML;
      if(p<1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  });
}

function renderChips(){
  const options = [['all','ทั้งหมด'], ['complete','ทำรับสมบูรณ์'], ['partial','ส่งบางส่วน'], ['pending','รอดำเนินการ'], ['late','ล่าช้า']];
  document.getElementById('statusChips').innerHTML = options.map(([key,label])=>
    `<button class="chip ${statusFilter===key?'active':''}" data-key="${key}">${label}</button>`
  ).join('');
  document.querySelectorAll('.chip').forEach(el=>{
    el.addEventListener('click', ()=>{ statusFilter = el.dataset.key; renderGrid(); renderChips(); });
  });
}

// shades of gold used to tell consecutive deliveries apart inside one bar
const SEG_COLORS = ['#f0d896','#e8c468','#d4ac4e','#c89b3c','#b3872f','#9c7526'];
function segColor(i){ return SEG_COLORS[i % SEG_COLORS.length]; }

function progressBarHTML(po){
  const delivered = po.deliveries.reduce((a,d)=>a+d.qty,0);
  const total = Math.max(po.qtyTotal || delivered, delivered, 1);
  const remaining = Math.max(total - delivered, 0);
  const pct = Math.min(Math.round((delivered/total)*100), 100);

  const segs = po.deliveries.map((d,i)=>{
    const w = Math.max((d.qty/total)*100, 0.6);
    return `<div class="po-progress-seg" style="width:${w.toFixed(2)}%;background:${segColor(i)}" title="${fmtShort(d.date)} · ${fmtNum(d.qty)} ${po.unit}"></div>`;
  }).join('');
  const remSeg = remaining > 0
    ? `<div class="po-progress-seg po-progress-remaining" style="width:${((remaining/total)*100).toFixed(2)}%" title="คงเหลือ ${fmtNum(remaining)} ${po.unit}"></div>`
    : '';

  const legendItems = po.deliveries.map((d,i)=>
    `<span><i class="dot" style="background:${segColor(i)}"></i>${fmtShort(d.date)} · <b>${fmtNum(d.qty)}</b> ${po.unit}</span>`
  ).join('');
  const remLegend = remaining > 0
    ? `<span><i class="dot" style="background:rgba(255,255,255,.18)"></i>คงเหลือ <b>${fmtNum(remaining)}</b> ${po.unit}</span>`
    : '';

  return `
    <div class="po-progress">
      <div class="po-progress-head">
        <span class="po-progress-total">${fmtNum(delivered)}<small> / ${fmtNum(total)} ${po.unit}</small></span>
        <span class="po-progress-pct">${pct}%</span>
      </div>
      <div class="po-progress-track">${segs}${remSeg}</div>
      <div class="po-progress-legend">${legendItems}${remLegend}</div>
    </div>`;
}

function tableHTML(po){
  const rows = po.deliveries.map((d,i)=>`
    <tr>
      <td>${i+1}</td>
      <td class="date">${fmtDate(d.date)}</td>
      <td class="num">${fmtNum(d.qty)} ${po.unit}</td>
      <td>${d.receiver}</td>
      <td>${d.note || '-'}</td>
    </tr>`).join('');
  const delivered = po.deliveries.reduce((a,d)=>a+d.qty,0);
  const remaining = Math.max(po.qtyTotal - delivered, 0);
  const remainingRow = (po.status !== 'complete' && remaining > 0)
    ? `<tr class="row-remaining"><td>—</td><td class="date">—</td><td class="num">${fmtNum(remaining)} ${po.unit}</td><td colspan="2">คงเหลือรอส่ง${po.eta ? ' · ' + po.eta : ''}</td></tr>`
    : '';
  if(!rows && !remainingRow){
    return `<div class="po-empty">ยังไม่มีข้อมูลการส่งของ</div>`;
  }
  return `
    <div class="po-table-wrap">
      <table class="po-table">
        <thead><tr><th>#</th><th>วันที่ส่ง</th><th>จำนวน</th><th>ผู้รับของ</th><th>หมายเหตุ</th></tr></thead>
        <tbody>${rows}${remainingRow}</tbody>
      </table>
    </div>`;
}

function poRowHTML(po){
  const s = STATUS[po.status];
  const delivered = po.deliveries.reduce((a,d)=>a+d.qty,0);
  return `
    <div class="po-row">

}

function iconSVG(key){
  return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" width="15" height="15"><path d="${CATEGORY_ICON[key]||CATEGORY_ICON.electric}"/></svg>`;
}

// --- vendor detail modal: donut of item mix, monthly delivery-count trend, tags ---
function donutSVG(segments){
  const total = segments.reduce((a,s)=>a+s.value,0) || 1;
  const size=140, r=48, cx=size/2, cy=size/2, circ = 2*Math.PI*r;
  let offset=0;
  const rings = segments.map(s=>{
    const frac = s.value/total;
    const dash = frac*circ;
    const el = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.color}" stroke-width="18"
      stroke-dasharray="${dash.toFixed(2)} ${(circ-dash).toFixed(2)}" stroke-dashoffset="${(-offset).toFixed(2)}" transform="rotate(-90 ${cx} ${cy})"/>`;
    offset += dash;
    return el;
  }).join('');
  return `<svg viewBox="0 0 ${size} ${size}" width="100%" style="max-width:150px; display:block; margin:0 auto;">
    ${rings}
    <circle cx="${cx}" cy="${cy}" r="${r-11}" fill="#0a1929"/>
  </svg>`;
}

function vendorItemBreakdown(vendor){
  const map = new Map();
  vendor.pos.forEach(po=>{
    map.set(po.itemDesc, (map.get(po.itemDesc)||0) + po.deliveries.length);
  });
  const entries = Array.from(map.entries()).sort((a,b)=>b[1]-a[1]);
  const top = entries.slice(0,4);
  const rest = entries.slice(4);
  if(rest.length){
    top.push(['อื่นๆ (' + rest.length + ' รายการ)', rest.reduce((a,[,v])=>a+v,0)]);
  }
  return top.map(([label,value],i)=>({label, value, color: segColor(i)}));
}

function vendorMonthlyCounts(vendor, monthsBack=6){
  const counts = new Map();
  vendor.pos.forEach(po=>po.deliveries.forEach(d=>{
    const ym = (d.date||'').slice(0,7);
    if(!ym) return;
    counts.set(ym, (counts.get(ym)||0)+1);
  }));
  // always show a continuous window of recent months (zero-filled) so trends
  // are visible even when a vendor only has one or two delivery records
  const now = new Date();
  const months = [];
  for(let i=monthsBack-1; i>=0; i--){
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    const ym = d.toISOString().slice(0,7);
    months.push({month: ym, count: counts.get(ym) || 0});
  }
  return months;
}

function monthlyBarSVG(data){
  if(!data.length) return `<div class="po-empty" style="text-align:center;">ยังไม่มีข้อมูล</div>`;
  const w=260, h=112, padT=18, padB=22, padX=12;
  const innerW = w - padX*2, innerH = h - padT - padB;
  const max = Math.max(...data.map(d=>d.count), 1);
  const gap = 8;
  const barW = (innerW - gap*(data.length-1)) / data.length;
  const bars = data.map((d,i)=>{
    const x = padX + i*(barW+gap);
    const monthLabel = new Date(d.month+'-01').toLocaleDateString('th-TH',{month:'short', year:'2-digit'});
    if(d.count === 0){
      // zero month: a thin baseline tick instead of an invisible/misleading bar
      const y = padT + innerH - 3;
      return `
        <rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barW.toFixed(1)}" height="3" rx="1.5" fill="rgba(255,255,255,.08)"/>
        <text x="${(x+barW/2).toFixed(1)}" y="${h-7}" text-anchor="middle" font-size="8.5" fill="#5f7590" font-family="IBM Plex Mono, monospace">${monthLabel}</text>`;
    }
    const bh = Math.max((d.count/max)*innerH, 6);
    const y = padT + innerH - bh;
    return `
      <text x="${(x+barW/2).toFixed(1)}" y="${(y-6).toFixed(1)}" text-anchor="middle" font-size="9.5" fill="#eaf1f8" font-weight="600" font-family="IBM Plex Mono, monospace">${d.count}</text>
      <rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barW.toFixed(1)}" height="${bh.toFixed(1)}" rx="4" fill="#e8c468"/>
      <text x="${(x+barW/2).toFixed(1)}" y="${h-7}" text-anchor="middle" font-size="8.5" fill="#8fa3b8" font-family="IBM Plex Mono, monospace">${monthLabel}</text>`;
  }).join('');
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" style="display:block;">
    <line x1="${padX}" y1="${padT+innerH}" x2="${w-padX}" y2="${padT+innerH}" stroke="rgba(232,196,104,.15)" stroke-width="1"/>
    ${bars}
  </svg>`;
}

function vendorTags(vendor){
  const cats = new Set();
  vendor.pos.forEach(po=> cats.add(CATEGORY_LABEL[guessIcon(po.itemDesc)]));
  return Array.from(cats);
}

          ${donutSVG(breakdown)}

function getFiltered(){
  const q = searchQuery.trim().toLowerCase();
  return vendors.map(v=>{
    const pos = v.pos.filter(po=>{
      const statusOk = statusFilter==='all' || po.status===statusFilter;
      const searchOk = !q || v.name.toLowerCase().includes(q) || po.poNumber.toLowerCase().includes(q) || po.itemDesc.toLowerCase().includes(q);
      return statusOk && searchOk;
    });
    return {...v, pos};
  }).filter(v=>v.pos.length>0);
}

function renderGrid(){
  const filtered = getFiltered();
  const grid = document.getElementById('vendorGrid');
  if(!filtered.length){
    grid.innerHTML = `<div class="empty">

      <div>ไม่พบผู้ขายหรือ PO ที่ตรงกับเงื่อนไข</div>
    </div>`;
    return;
  }
  grid.innerHTML = filtered.map((v,i)=>vendorCardHTML(v,i)).join('');
  grid.querySelectorAll('.vendor-card').forEach(card=>{
    card.addEventListener('click', ()=> openVendorModal(card.dataset.id));
    card.addEventListener('keydown', e=>{
      if(e.key==='Enter' || e.key===' '){ e.preventDefault(); openVendorModal(card.dataset.id); }
    });
  });
}

// one-time fetch — replaces the old onSnapshot real-time listener so the page
// only reads from Firestore when it first loads or when the user explicitly
// clicks "รีเฟรช", instead of on every keystroke/re-render/remote write.
async function fetchData(){
  refreshBtn.disabled = true;
  refreshBtn.classList.add('spinning');
  try{
    const snapshot = await getDocs(deliveriesRef);
    const docsData = snapshot.docs.map(doc => doc.data());
    vendors = buildVendorsFromDocs(docsData);
    connTag.textContent = `อัปเดตล่าสุด ${fmtTime(new Date())} · ${docsData.length} รายการรับของ`;
    renderStats();
    renderGrid();
  }catch(err){
    console.error('Firestore error:', err);
    connTag.textContent = 'เชื่อมต่อ Firestore ไม่สำเร็จ';
    document.getElementById('vendorGrid').innerHTML = `<div class="empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <div>ไม่สามารถโหลดข้อมูลได้: ${err.message}<br>ตรวจสอบ Firestore Security Rules และการเชื่อมต่อเครือข่าย</div>
    </div>`;
  }finally{
    refreshBtn.disabled = false;
    refreshBtn.classList.remove('spinning');
  }
}

refreshBtn.addEventListener('click', fetchData);
fetchData();
</script>
</body>
</html>
