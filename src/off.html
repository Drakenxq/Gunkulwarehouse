<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import {
  getFirestore, collection, onSnapshot
} from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

/* ---------------------------------------------------------
   Firebase config — this project is the MAIN data source.
   Collection used: warehouse_deliveries
--------------------------------------------------------- */
const firebaseConfig = {
  apiKey: "AIzaSyAkPFzgT7hLAxPVI129F-vRzA65MIx2VIs",
  authDomain: "gunkul-my-task-system.firebaseapp.com",
  projectId: "gunkul-my-task-system",
  storageBucket: "gunkul-my-task-system.firebasestorage.app",
  messagingSenderId: "877006770872",
  appId: "1:877006770872:web:ec56ec0089512899811a4d"
};

const COLLECTION_NAME = "warehouse_deliveries";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ---------------------------------------------------------
   Firestore data state
--------------------------------------------------------- */
let RAW_DOCS = [];       // raw docs straight from Firestore, normalized
let hasLoadedOnce = false;

const STATUS_OPTIONS = [
  { value: "all", label: "ทั้งหมด" },
  { value: "pending", label: "รอดำเนินการ" },
  { value: "in_transit", label: "อยู่ระหว่างขนส่ง" },
  { value: "delivered", label: "รับแล้ว" },
  { value: "cancelled", label: "ยกเลิก/มีปัญหา" },
];
const SORT_OPTIONS = [
  { value: "date_desc", label: "วันที่ล่าสุดก่อน" },
  { value: "date_asc", label: "วันที่เก่าสุดก่อน" },
  { value: "amount_desc", label: "มูลค่าสูง-ต่ำ" },
  { value: "amount_asc", label: "มูลค่าต่ำ-สูง" },
];

function fmtCurrency(n) {
  if (typeof n !== "number" || Number.isNaN(n)) return "-";
  return "฿" + n.toLocaleString("en-US", { maximumFractionDigits: 0 });
}

/* Pull the first matching field name out of a doc, tolerating varied schemas */
function pick(obj, keys, fallback = undefined) {
  for (const k of keys) {
    if (obj[k] !== undefined && obj[k] !== null && obj[k] !== "") return obj[k];
  }
  return fallback;
}

function toDate(value) {
  if (!value) return null;
  if (typeof value.toDate === "function") return value.toDate(); // Firestore Timestamp
  if (value instanceof Date) return value;
  const parsed = new Date(value);
  return Number.isNaN(parsed.getTime()) ? null : parsed;
}

function fmtDate(d) {
  if (!d) return "-";
  return d.toLocaleDateString("th-TH", { day: "2-digit", month: "2-digit", year: "numeric" });
}

function normalizeStatus(raw) {
  const s = String(raw || "").toLowerCase().trim();
  if ([
  "received",
  "delivered",
  "completed",
  "done",
  "สำเร็จ",
  "รับแล้ว"
  ].includes(s)) return "delivered";
  if (["in_transit", "in-transit", "transit", "shipping", "อยู่ระหว่างขนส่ง", "กำลังขนส่ง"].includes(s)) return "in_transit";
  if (["cancelled", "canceled", "delayed", "failed", "ยกเลิก", "ล่าช้า"].includes(s)) return "cancelled";
  if (["pending", "รอดำเนินการ", "รอ"].includes(s) || !s) return "pending";
  return "pending";
}

function statusMeta(status) {
  switch (status) {
    case "delivered": return { cls: "status-delivered", label: "รับแล้ว" };
    case "in_transit": return { cls: "status-transit", label: "อยู่ระหว่างขนส่ง" };
    case "cancelled": return { cls: "status-cancelled", label: "ยกเลิก/มีปัญหา" };
    case "pending": return { cls: "status-pending", label: "รอดำเนินการ" };
    default: return { cls: "status-other", label: status || "ไม่ระบุ" };
  }
}

/* Normalize a raw Firestore doc into a stable shape the UI relies on */
function normalizeDoc(id, data) {

  const firstItem = Array.isArray(data.items) && data.items.length
    ? data.items[0]
    : {};

  return {
    id,

    sender: data.sender || "-",
    recipient: data.recipient || "-",
    invoice: data.invoice || "-",

    itemName: firstItem.name || "-",

    quantity: firstItem.qty
      ? `${firstItem.qty} ${firstItem.unit || ""}`
      : "-",

    date: toDate(data.date),

    status: normalizeStatus(data.status)
  };
}

/* ---------------------------------------------------------
   Connection status UI
--------------------------------------------------------- */
function setConnStatus(state, text) {
  const el = document.getElementById("connStatus");
  el.className = "conn-status " + state;
  document.getElementById("connStatusText").textContent = text;
}

function showError(message) {
  const banner = document.getElementById("errorBanner");
  banner.style.display = "flex";
  document.getElementById("errorBannerText").innerHTML =
    `ไม่สามารถโหลดข้อมูลจาก Firestore ได้: <code>${message}</code>`;
}
function clearError() {

--------------------------------------------------------- */
function renderFilterOptions() {
  document.getElementById("statusSelect").innerHTML =
    STATUS_OPTIONS.map(o => `<option value="${o.value}">${o.label}</option>`).join("");
  document.getElementById("sortSelect").innerHTML =
    SORT_OPTIONS.map(o => `<option value="${o.value}">${o.label}</option>`).join("");
}

function getFilteredRows() {
  const query = document.getElementById("searchInput").value.toLowerCase().trim();
  const status = document.getElementById("statusSelect").value;
  const sort = document.getElementById("sortSelect").value;
  const pendingOnly = document.getElementById("pendingOnly").checked;

  let rows = RAW_DOCS.filter(r => {
    const matchesQuery =
      !query ||
      (r.invoice || "").toLowerCase().includes(query) ||
      (r.sender || "").toLowerCase().includes(query) ||
      (r.recipient || "").toLowerCase().includes(query) ||
      (r.itemName || "").toLowerCase().includes(query);

    const matchesStatus = status === "all" || r.status === status;
    const matchesPending = !pendingOnly || r.status !== "delivered";
    return matchesQuery && matchesStatus && matchesPending;
  });

  rows.sort((a, b) => {
    if (sort === "date_desc") return (b.date?.getTime() || 0) - (a.date?.getTime() || 0);
    if (sort === "date_asc") return (a.date?.getTime() || 0) - (b.date?.getTime() || 0);
    if (sort === "amount_desc") return (b.amount || 0) - (a.amount || 0);
    if (sort === "amount_asc") return (a.amount || 0) - (b.amount || 0);
    return 0;
  });

  return rows;
}

  /* ---------------------------------------------------------
    CSV export of the currently filtered rows
  --------------------------------------------------------- */
  function exportCsv() {
    const rows = getFilteredRows();
    if (rows.length === 0) return;
    const header = ["วันที่นำส่ง", "ผู้ส่ง", "รายการสินค้า", "ผู้จัดส่ง", "หมายเลข PO","สถานะ"];
    const lines = [header.join(",")];
    rows.forEach(r => {
      const meta = statusMeta(r.status);
    const cells = [
        fmtDate(r.date),
        r.sender,
        r.itemName,
        r.recipient,
        r.invoice,
        meta.label
      ];
      lines.push(cells.map(c => `"${String(c).replace(/"/g, '""')}"`).join(","));
    });
    const blob = new Blob(["\uFEFF" + lines.join("\n")], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `warehouse_deliveries_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  }

  // Data is already realtime via onSnapshot; this just gives visual feedback.
  const btn = document.getElementById("refreshBtn");
  btn.disabled = true;
  setTimeout(() => { btn.disabled = false; }, 500);
});

/* ---------------------------------------------------------
   Firestore realtime subscription — MAIN data source
--------------------------------------------------------- */
try {
  const colRef = collection(db, COLLECTION_NAME);
  onSnapshot(
    colRef,
    (snapshot) => {
      clearError();
      RAW_DOCS = snapshot.docs.map(doc => normalizeDoc(doc.id, doc.data()));
      hasLoadedOnce = true;
      setConnStatus("live", ` • อัปเดตล่าสุด ${new Date().toLocaleTimeString("th-TH")}`);
      renderAll();
    },
    (err) => {
      console.error("Firestore onSnapshot error:", err);
      setConnStatus("error", "การเชื่อมต่อผิดพลาด");
      showError(err.message || String(err));
      if (!hasLoadedOnce) {
        RAW_DOCS = [];
        renderAll();
      }
    }
  );
} catch (err) {
  console.error("Firebase init error:", err);
  setConnStatus("error", "ไม่สามารถเริ่มต้น Firebase ได้");
  showError(err.message || String(err));
}
</script>
