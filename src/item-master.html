<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ระบบสรุปรายการสินค้า (Item Master)</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #f8fafc; --card: #ffffff; --soft: #f1f5f9; --border: #e2e8f0;
  --text: #0f172a; --text-soft: #64748b;
  --navy: #0d1b3e; --navy2: #16295c; --navy3: #1f3570;
  --gold: #d4a94a; --gold-hover: #c69a3a; --gold-glow: rgba(212, 169, 74, 0.14);
  --blue: #d4a94a; --green: #059669; --orange: #d97706; --red: #dc2626;
  --shadow-sm: 0 1px 2px 0 rgba(0,0,0,0.05);
  --shadow: 0 4px 6px -1px rgba(0,0,0,0.08), 0 2px 4px -1px rgba(0,0,0,0.04);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans Thai', sans-serif; }

.topbar {
  height: 65px; display: flex; align-items: center; gap: 12px;
  padding: 0 24px;
  background: linear-gradient(160deg, var(--navy) 0%, var(--navy2) 60%, var(--navy3) 100%);
  position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow-lg, 0 4px 12px rgba(0,0,0,.25));
}
.logo {
  width: 40px; height: 40px; border-radius: 12px;
  background: linear-gradient(135deg, var(--gold), #f0d99a);
  display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--navy);
  box-shadow: 0 4px 10px var(--gold-glow);
}
.topbar h1 { font-size: 15px; font-weight: 500; color: #fff; }
.top-actions { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.btn {
  border: 1px solid rgba(255,255,255,0.18); cursor: pointer; background: rgba(255,255,255,0.06); color: #fff;
  padding: 9px 14px; border-radius: 10px; display: flex; align-items: center; gap: 6px;
  font-family: 'IBM Plex Sans Thai', sans-serif; font-size: 13px; transition: 0.2s;
}
.btn:hover { background: rgba(255,255,255,0.14); border-color: rgba(255,255,255,0.3); opacity: 1; }

.live-badge {
  display: flex; align-items: center; gap: 6px; font-size: 12px; color: rgba(255,255,255,0.75);
  padding: 6px 10px; border-radius: 100px; background: rgba(255,255,255,0.06);
}
.live-dot { width: 7px; height: 7px; border-radius: 50%; background: #34d399; flex-shrink: 0; }
.live-dot.paused { background: #94a3b8; animation: none !important; }
.live-dot.live { animation: pulse-dot 1.6s ease-in-out infinite; }
@keyframes pulse-dot { 0%,100%{ opacity:1; box-shadow:0 0 0 0 rgba(52,211,153,.5);} 50%{ opacity:.6; box-shadow:0 0 0 5px rgba(52,211,153,0);} }

.content { padding: 20px; }
.table-wrap { overflow: auto; }
table { width: 100%; border-collapse: collapse; }
th {
  background: var(--soft); color: var(--text-soft); font-size: 11px;
  text-transform: uppercase; padding: 12px; text-align: left; white-space: nowrap;
}
td { padding: 14px 12px; border-bottom: 1px solid var(--border); font-size: 13px; }
tr:hover { background: rgba(15,23,42,.03); }

.status { padding: 5px 10px; border-radius: 999px; font-size: 11px; }
.received { background: rgba(5,150,105,.1); color: #059669; }
.pending { background: rgba(217,119,6,.1); color: #d97706; }

/* ITEM SUMMARY */
.summary-toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
.summary-search {
  flex: 1; min-width: 200px; background: var(--soft); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text); font-family: 'IBM Plex Sans Thai', sans-serif;
  font-size: 14px; padding: 9px 14px; outline: none; transition: border-color 0.2s;
}
.summary-search:focus { border-color: var(--blue); }
.summary-search::placeholder { color: var(--text-soft); }
.summary-filter {
  background: var(--soft); border: 1px solid var(--border); border-radius: 10px;
  color: var(--text); font-family: 'IBM Plex Sans Thai', sans-serif;
  font-size: 13px; padding: 9px 14px; outline: none; cursor: pointer;
}

.item-summary-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; margin-bottom: 12px; overflow: hidden; transition: border-color 0.2s;
}
.item-summary-card:hover { border-color: rgba(212,169,74,0.4); }
.item-summary-header {
  display: flex; align-items: center; gap: 12px; padding: 14px 18px;
  cursor: pointer; user-select: none;
}
.item-summary-header:hover { background: rgba(15,23,42,.02); }
.item-icon {
  width: 36px; height: 36px; border-radius: 10px;
  background: rgba(212,169,74,0.12); border: 1px solid rgba(212,169,74,0.3);
  display: flex; align-items: center; justify-content: center;
  color: var(--blue); font-size: 16px; flex-shrink: 0;
}
.item-summary-info { flex: 1; min-width: 0; }
.item-summary-name {
  font-size: 13px; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px;
}
.item-summary-meta { font-size: 11px; color: var(--text-soft); display: flex; gap: 12px; flex-wrap: wrap; }
.item-summary-meta span { display: flex; align-items: center; gap: 4px; }
.item-summary-stats { display: flex; gap: 16px; align-items: center; flex-shrink: 0; }
.stat-pill { text-align: center; }
.stat-pill-num { font-family: 'IBM Plex Mono', monospace; font-size: 18px; font-weight: 600; color: var(--blue); line-height: 1; }
.stat-pill-label { font-size: 10px; color: var(--text-soft); margin-top: 2px; }
.chevron { color: var(--text-soft); font-size: 16px; transition: transform 0.2s; flex-shrink: 0; }
.item-summary-card.open .chevron { transform: rotate(180deg); }

.item-breakdown { display: none; border-top: 1px solid var(--border); background: var(--soft); }
.item-summary-card.open .item-breakdown { display: block; }
.breakdown-table { width: 100%; border-collapse: collapse; }
.breakdown-table th { background: var(--soft); font-size: 10px; padding: 10px 18px; color: var(--text-soft); }
.breakdown-table td { padding: 12px 18px; font-size: 12px; border-bottom: 1px solid var(--border); }
.breakdown-table tr:last-child td { border-bottom: none; }
.breakdown-table tr:hover td { background: rgba(15,23,42,.02); }

/* Utility tags */
.invoice-tag {
  font-family: 'IBM Plex Mono', monospace; font-size: 11px;
  background: rgba(212,169,74,0.12); color: var(--blue);
  padding: 3px 8px; border-radius: 6px; border: 1px solid rgba(212,169,74,0.25);
}
.qty-badge { font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 600; color: var(--green); }
.checked-yes { color: var(--green); }
.checked-no { color: var(--orange); }

.empty-state { text-align: center; padding: 60px 20px; color: var(--text-soft); }
.empty-state-icon { font-size: 48px; margin-bottom: 14px; color: var(--text-soft); }
.empty-state-title { font-size: 16px; font-weight: 500; color: var(--text); margin-bottom: 6px; }

.summary-kpi { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 18px; }
.summary-kpi-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 12px;
  padding: 14px 16px; display: flex; align-items: center; gap: 12px;
}
.summary-kpi-icon {
  width: 36px; height: 36px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0;
}
.summary-kpi-icon.blue { background: rgba(212,169,74,0.15); color: var(--blue); }
.summary-kpi-icon.green { background: rgba(5,150,105,0.12); color: var(--green); }
.summary-kpi-icon.orange { background: rgba(217,119,6,0.12); color: var(--orange); }
.summary-kpi-num { font-size: 22px; font-weight: 600; font-family: 'IBM Plex Mono', monospace; line-height: 1; }
.summary-kpi-lbl { font-size: 11px; color: var(--text-soft); margin-top: 2px; }

@media(max-width: 700px) { .item-summary-stats { display: none; } }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo"><i class="ti ti-package"></i></div>
  <h1>ระบบสรุปรายการสินค้า (Item Master)</h1>
  <div class="top-actions">
    <div class="live-badge">
      <span class="live-dot live" id="liveDot"></span>
      <span id="liveLabel">อัปเดตล่าสุด: -</span>
    </div>
    <button class="btn" onclick="manualRefresh()"><i class="ti ti-refresh"></i> รีเฟรชตอนนี้</button>
    <button class="btn" onclick="exportCSV()"><i class="ti ti-download"></i> Export CSV</button>
  </div>
</div>

<div class="content">
  <div class="summary-kpi">
    <div class="summary-kpi-card">
      <div class="summary-kpi-icon blue"><i class="ti ti-box"></i></div>
      <div><div class="summary-kpi-num" id="si-uniqueItems">0</div><div class="summary-kpi-lbl">ชนิดสินค้า</div></div>
    </div>
    <div class="summary-kpi-card">
      <div class="summary-kpi-icon green"><i class="ti ti-stack"></i></div>
      <div><div class="summary-kpi-num" id="si-totalQty">0</div><div class="summary-kpi-lbl">จำนวนรวมทั้งหมด</div></div>
    </div>
    <div class="summary-kpi-card">
      <div class="summary-kpi-icon orange"><i class="ti ti-file-invoice"></i></div>
      <div><div class="summary-kpi-num" id="si-totalInvoices">0</div><div class="summary-kpi-lbl">Invoice ที่มีสินค้า</div></div>
    </div>
  </div>

  <div class="summary-toolbar">
    <input type="search" class="summary-search" id="item-search"
      placeholder="🔍   ค้นหาชื่อสินค้า, Invoice, ผู้ส่ง..."
      oninput="renderItemSummary()" autocomplete="off">
    <select class="summary-filter" id="item-status-filter" onchange="renderItemSummary()">
      <option value="all">ทุกสถานะใบรับ</option>
      <option value="received">รับแล้ว</option>
      <option value="pending">รอดำเนินการ</option>
    </select>
    <select class="summary-filter" id="item-sort" onchange="renderItemSummary()">
      <option value="qty-desc">จำนวน ↓</option>
      <option value="qty-asc">จำนวน ↑</option>
      <option value="name-asc">ชื่อ A→Z</option>
      <option value="invoice-count">จำนวน Invoice</option>
    </select>
  </div>
  
  <div id="itemSummaryList"></div>
</div>

<script>
window._escHtml = function(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
};
window._formatDate = function(dateStr) {
  if (!dateStr) return '-';
  const d = new Date(dateStr);
  if (isNaN(d)) return String(dateStr);
  return d.toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' });
};
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, query, orderBy, limit, getDocs }
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAkPFzgT7hLAxPVI129F-vRzA65MIx2VIs",
  authDomain: "gunkul-my-task-system.firebaseapp.com",
  projectId: "gunkul-my-task-system",
  storageBucket: "gunkul-my-task-system.firebasestorage.app",
  messagingSenderId: "877006770872",
  appId: "1:877006770872:web:ec56ec0089512899811a4d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const esc = window._escHtml;
const fmt = window._formatDate;

let receipts = [];
let processedItemsForExport = []; // ตัวแปรเก็บข้อมูลสินค้าที่ผ่าน Filter ปัจจุบันเพื่อทำ CSV
let pollTimer = null;
let isFetching = false;

const REFRESH_MS = 4 * 60 * 1000;   // Polling ทุก 4 นาทีเพื่อประหยัด Firestore Reads
const DOC_LIMIT = 150;

const q = query(
  collection(db, "warehouse_deliveries"),
  orderBy('createdAt', 'desc'),
  limit(DOC_LIMIT)
);

async function fetchReceipts() {
  if (isFetching) return;
  isFetching = true;
  setLiveState('loading');
  try {
    const snap = await getDocs(q);
    receipts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderItemSummary();
    setLiveState('live');
  } catch (err) {
    console.warn('โหลดข้อมูลไม่สำเร็จ:', err);
    setLiveState('error');
  } finally {
    isFetching = false;
  }
}

function setLiveState(state) {
  const dot = document.getElementById('liveDot');
  const label = document.getElementById('liveLabel');
  const now = new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  if (state === 'loading') {
    dot.className = 'live-dot live';
    label.textContent = 'กำลังอัปเดต...';
  } else if (state === 'live') {
    dot.className = 'live-dot live';
    label.textContent = `อัปเดตล่าสุด: ${now}`;
  } else if (state === 'paused') {
    dot.className = 'live-dot paused';
    label.textContent = `หยุดชั่วคราว · ล่าสุด ${now}`;
  } else if (state === 'error') {
    dot.className = 'live-dot paused';
    label.textContent = 'โหลดข้อมูลไม่สำเร็จ';
  }
}

function startPolling() {
  stopPolling();
  pollTimer = setInterval(() => fetchReceipts(), REFRESH_MS);
}
function stopPolling() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden') {
    stopPolling();
    setLiveState('paused');
  } else {
    fetchReceipts();
    startPolling();
  }
});

window.manualRefresh = function () {
  fetchReceipts();
};

// รันครั้งแรกเมื่อโหลดหน้าเว็บ
fetchReceipts();
startPolling();

/* ============ ITEM SUMMARY PROCESSING & RENDER ============ */
window.renderItemSummary = function() {
  const search = (document.getElementById('item-search')?.value || '').toLowerCase().trim();
  const statusFilter = document.getElementById('item-status-filter')?.value || 'all';
  const sortBy = document.getElementById('item-sort')?.value || 'qty-desc';

  const itemMap = new Map();

  receipts.forEach(r => {
    if (!r.items) return;
    const docStatus = r.status || 'pending';
    if (statusFilter === 'received' && docStatus !== 'received') return;
    if (statusFilter === 'pending' && docStatus === 'received') return;

    r.items.forEach(item => {
      const name = (item.name || '').trim();
      if (!name) return;
      if (!itemMap.has(name)) {
        itemMap.set(name, { name, unit: item.unit || '', totalQty: 0, checkedQty: 0, invoiceCount: 0, invoices: [] });
      }
      const entry = itemMap.get(name);
      const qty = Number(item.qty) || 0;
      entry.totalQty += qty;
      if (item.checked === true) entry.checkedQty += qty;
      entry.invoices.push({
        invoice: r.invoice || '-', sender: r.sender || '-', date: r.date || '',
        warehouse: r.warehouse || '-', qty, unit: item.unit || '',
        checked: item.checked === true, status: docStatus, docId: r.id
      });
    });
  });

  itemMap.forEach(entry => {
    entry.invoiceCount = new Set(entry.invoices.map(i => i.invoice)).size;
  });

  let items = Array.from(itemMap.values());
  if (search) {
    items = items.filter(item =>
      item.name.toLowerCase().includes(search) ||
      item.invoices.some(inv =>
        inv.invoice.toLowerCase().includes(search) ||
        inv.sender.toLowerCase().includes(search)
      )
    );
  }

  items.sort((a, b) => {
    if (sortBy === 'qty-desc') return b.totalQty - a.totalQty;
    if (sortBy === 'qty-asc') return a.totalQty - b.totalQty;
    if (sortBy === 'name-asc') return a.name.localeCompare(b.name, 'th');
    if (sortBy === 'invoice-count') return b.invoiceCount - a.invoiceCount;
    return 0;
  });

  // บันทึกข้อมูลที่ผ่านการกรองลงตัวแปร Global เพื่อใช้ทำการ Export ลง Excel (CSV)
  processedItemsForExport = items;

  const totalQtyAll = items.reduce((s, x) => s + x.totalQty, 0);
  const allInvoices = new Set();
  items.forEach(x => x.invoices.forEach(inv => allInvoices.add(inv.invoice)));

  document.getElementById('si-uniqueItems').innerText = items.length;
  document.getElementById('si-totalQty').innerText = totalQtyAll.toLocaleString();
  document.getElementById('si-totalInvoices').innerText = allInvoices.size;

  const container = document.getElementById('itemSummaryList');

  if (items.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon"><i class="ti ti-package-off"></i></div>
        <div class="empty-state-title">ไม่พบข้อมูลสินค้า</div>
        <div>ลองปรับเปลี่ยนเงื่อนไขหรือคำค้นหา</div>
      </div>`;
    return;
  }

  container.innerHTML = items.map((item, idx) => {
    const checkedPct = item.totalQty > 0 ? Math.round((item.checkedQty / item.totalQty) * 100) : 0;
    const rows = item.invoices.map(inv => `
      <tr>
        <td><span class="invoice-tag">${esc(inv.invoice)}</span></td>
        <td>${esc(inv.sender)}</td>
        <td>${fmt(inv.date)}</td>
        <td>${esc(inv.warehouse)}</td>
        <td><span class="qty-badge">${inv.qty.toLocaleString()}</span> ${esc(inv.unit)}</td>
        <td><span class="${inv.checked ? 'checked-yes' : 'checked-no'}">
          <i class="ti ti-${inv.checked ? 'circle-check' : 'circle-x'}"></i>
          ${inv.checked ? 'ตรวจแล้วโดย FG' : 'ยังไม่ตรวจ'}
        </span></td>
        <td><span class="status ${inv.status === 'received' ? 'received' : 'pending'}">
          ${inv.status === 'received' ? 'รับแล้ว' : 'รอดำเนินการ'}
        </span></td>
      </tr>`).join('');

    return `
    <div class="item-summary-card" id="isc-${idx}">
      <div class="item-summary-header" onclick="toggleItemCard('isc-${idx}')">
        <div class="item-icon"><i class="ti ti-box"></i></div>
        <div class="item-summary-info">
          <div class="item-summary-name" title="${esc(item.name)}">${esc(item.name)}</div>
          <div class="item-summary-meta">
            <span><i class="ti ti-file-invoice"></i> ${item.invoiceCount} Invoice</span>
            <span><i class="ti ti-tag"></i> ${esc(item.unit)}</span>
            <span><i class="ti ti-circle-check" style="color:var(--green)"></i> ตรวจแล้ว ${checkedPct}%</span>
          </div>
        </div>
        <div class="item-summary-stats">
          <div class="stat-pill">
            <div class="stat-pill-num">${item.totalQty.toLocaleString()}</div>
            <div class="stat-pill-label">รวมทั้งหมด</div>
          </div>
          <div class="stat-pill">
            <div class="stat-pill-num" style="color:var(--green)">${item.checkedQty.toLocaleString()}</div>
            <div class="stat-pill-label">ตรวจแล้ว</div>
          </div>
        </div>
        <i class="ti ti-chevron-down chevron"></i>
      </div>
      <div class="item-breakdown">
        <table class="breakdown-table">
          <thead>
            <tr><th>Invoice</th><th>ผู้ส่ง</th><th>วันที่</th><th>คลัง</th><th>จำนวน</th><th>ตรวจสอบ</th><th>สถานะใบรับ</th></tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
  }).join('');
};

window.toggleItemCard = function(id) {
  document.getElementById(id)?.classList.toggle('open');
};

/* ============ NEW EXPORT: ITEM BREAKDOWN CSV ============ */
window.exportCSV = function() {
  if (!processedItemsForExport || processedItemsForExport.length === 0) {
    alert('ไม่มีข้อมูลสินค้าให้ออกรายงาน');
    return;
  }

  // ปรับคอลัมน์ Excel ให้สอดคล้องกับรายละเอียดของตัวสินค้า
  let csv = 'ชื่อสินค้า,เลขที่ Invoice,ผู้ส่ง,วันที่รับเอกสาร,คลังสินค้า,จำนวน,หน่วยนับ,การตรวจสอบโดย FG,สถานะใบรับ\n';
  
  processedItemsForExport.forEach(item => {
    item.invoices.forEach(inv => {
      const cleanName = item.name.replace(/"/g, '""'); // ป้องกันเครื่องหมายฟันหนูในชื่อสินค้าทำ CSV รวน
      const checkStatus = inv.checked ? 'ตรวจแล้วโดย FG' : 'ยังไม่ตรวจ';
      const docStatus = inv.status === 'received' ? 'รับแล้ว' : 'รอดำเนินการ';
      
      csv += `"${cleanName}","${inv.invoice}","${inv.sender}","${inv.date}","${inv.warehouse}",${inv.qty},"${inv.unit}","${checkStatus}","${docStatus}"\n`;
    });
  });

  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' }));
  a.download = `สรุปรายการสินค้า_ItemMaster_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
};
</script>
</body>
</html>
